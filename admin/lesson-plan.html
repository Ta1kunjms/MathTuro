<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../Logo/MATHURO-LOGO.png">
    <title>Lesson Plans - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        maroon: '#800000',
                        'maroon-dark': '#600000',
                        'maroon-light': '#990000',
                        gold: '#FFD700',
                        'gold-light': '#FFED4E',
                        'gold-dark': '#B8860B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #800000 0%, #990000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #800000 0%, #990000 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.3);
        }
        
        .lesson-card {
            transition: all 0.3s ease;
        }
        
        .lesson-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #800000; border-radius: 3px; }
    </style>
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-6 py-4">
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="lg:hidden p-2 text-gray-600 hover:text-gray-900">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                
                <!-- Page Title -->
                <h1 class="text-2xl font-bold gradient-text">Lesson Plans</h1>
                
                <!-- Header Actions -->
                <div class="flex items-center space-x-4">
                    <button onclick="openAddLessonModal()" class="bg-maroon text-white px-4 py-2 rounded-lg hover:bg-maroon-dark transition-colors">
                        <i class="fas fa-plus mr-2"></i>Add Lesson Plan
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="p-6">
            <!-- Lesson Plans List -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-6">
                    <h2 class="text-lg font-semibold mb-4">All Lesson Plans</h2>
                    <div id="lessonsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Lesson plans will be dynamically loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Lesson Plan Modal -->
    <div id="lessonModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200">
                <h3 id="modalTitle" class="text-xl font-semibold">Add New Lesson Plan</h3>
            </div>
            <form id="lessonForm" onsubmit="handleLessonSubmit(event)">
                <div class="p-6 space-y-4">
                    <input type="hidden" id="lessonId">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Lesson Title</label>
                        <input type="text" id="lessonTitle" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Enter lesson title">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea id="lessonDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Enter lesson description"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Grade Level</label>
                            <select id="lessonGradeLevel" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent">
                                <option value="">Select grade level</option>
                                <option value="1">Grade 1</option>
                                <option value="2">Grade 2</option>
                                <option value="3">Grade 3</option>
                                <option value="4">Grade 4</option>
                                <option value="5">Grade 5</option>
                                <option value="6">Grade 6</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                            <select id="lessonStatus" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent">
                                <option value="active">Active</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Lesson Plan File</label>
                        <input type="file" id="lessonFile" accept=".pdf,.doc,.docx" class="w-full px-3 py-2 border border-gray-300 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-maroon file:text-white hover:file:bg-maroon-dark">
                    </div>
                </div>
                
                <div class="p-6 border-t border-gray-200 flex justify-end space-x-3">
                    <button type="button" onclick="closeLessonModal()" class="px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-maroon text-white rounded-lg hover:bg-maroon-dark">
                        <i id="submitIcon" class="fas fa-save mr-2"></i>
                        <span id="submitText">Save Lesson Plan</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        let currentUser = null;

        // Lesson plan management functions
        async function loadAllLessons() {
            try {
                const lessonsList = document.getElementById('lessonsList');
                lessonsList.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-maroon"></div>
                        <p class="mt-4 text-gray-600">Loading lesson plans...</p>
                    </div>
                `;

                const { data: lessons, error } = await getSupabase().from('lesson_plans').select(`
                    id, title, description, grade_level, status, file_url, created_at,
                    teacher:teacher_id (full_name)
                `).order('created_at', { ascending: false });

                if (error) throw error;

                if (lessons.length === 0) {
                    lessonsList.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i class="fas fa-file-alt text-6xl text-gray-300 mb-4"></i>
                            <h3 class="text-lg font-medium text-gray-900 mb-2">No Lesson Plans Found</h3>
                            <p class="text-gray-500 mb-6">Get started by uploading your first lesson plan</p>
                            <button onclick="openAddLessonModal()" class="bg-maroon text-white px-4 py-2 rounded-lg hover:bg-maroon-dark">
                                <i class="fas fa-plus mr-2"></i>Add First Lesson Plan
                            </button>
                        </div>
                    `;
                    return;
                }

                lessonsList.innerHTML = lessons.map(lesson => `
                    <div class="lesson-card bg-white border border-gray-200 rounded-lg p-6 hover:shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-semibold text-gray-900">${lesson.title}</h3>
                            <span class="px-3 py-1 text-xs font-medium rounded-full ${
                                lesson.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'
                            }">${lesson.status}</span>
                        </div>
                        
                        <p class="text-gray-600 text-sm mb-4">${lesson.description || 'No description'}</p>
                        
                        <div class="space-y-2 text-sm text-gray-500 mb-6">
                            <div class="flex items-center">
                                <i class="fas fa-graduation-cap mr-2"></i>
                                <span>Grade ${lesson.grade_level}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-user mr-2"></i>
                                <span>Created by: ${lesson.teacher?.full_name || 'Unknown'}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-file-alt mr-2"></i>
                                <span>PDF Document</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-calendar mr-2"></i>
                                <span>${new Date(lesson.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        
                        <div class="flex space-x-3">
                            <a href="${lesson.file_url}" target="_blank" class="flex-1 px-3 py-2 text-sm bg-blue-100 text-blue-800 rounded-lg hover:bg-blue-200">
                                <i class="fas fa-download mr-1"></i>Download
                            </a>
                            <button onclick="editLesson('${lesson.id}')" class="flex-1 px-3 py-2 text-sm bg-green-100 text-green-800 rounded-lg hover:bg-green-200">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                            <button onclick="deleteLesson('${lesson.id}')" class="flex-1 px-3 py-2 text-sm bg-red-100 text-red-800 rounded-lg hover:bg-red-200">
                                <i class="fas fa-trash mr-1"></i>Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading lessons:', error);
                showNotification('Failed to load lesson plans', 'error');
            }
        }

        function openAddLessonModal() {
            document.getElementById('modalTitle').textContent = 'Add New Lesson Plan';
            document.getElementById('submitText').textContent = 'Save Lesson Plan';
            document.getElementById('submitIcon').className = 'fas fa-save mr-2';
            document.getElementById('lessonForm').reset();
            document.getElementById('lessonId').value = '';
            document.getElementById('lessonModal').classList.remove('hidden');
        }

        function closeLessonModal() {
            document.getElementById('lessonModal').classList.add('hidden');
        }

        async function editLesson(lessonId) {
            try {
                const { data: lesson, error } = await getSupabase().from('lesson_plans').select('*').eq('id', lessonId).single();
                
                if (error) throw error;

                document.getElementById('modalTitle').textContent = 'Edit Lesson Plan';
                document.getElementById('submitText').textContent = 'Update Lesson Plan';
                document.getElementById('submitIcon').className = 'fas fa-edit mr-2';
                document.getElementById('lessonId').value = lesson.id;
                document.getElementById('lessonTitle').value = lesson.title;
                document.getElementById('lessonDescription').value = lesson.description;
                document.getElementById('lessonGradeLevel').value = lesson.grade_level;
                document.getElementById('lessonStatus').value = lesson.status;
                document.getElementById('lessonModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error fetching lesson:', error);
                showNotification('Failed to load lesson details', 'error');
            }
        }

        async function deleteLesson(lessonId) {
            if (!confirm('Are you sure you want to delete this lesson plan? This action cannot be undone.')) {
                return;
            }

            try {
                const { data: lesson, error: fetchError } = await getSupabase().from('lesson_plans').select('file_url').eq('id', lessonId).single();
                if (fetchError) throw fetchError;

                if (lesson.file_url) {
                    const fileName = lesson.file_url.split('/').pop();
                    const { error: storageError } = await getSupabase().storage.from('lesson-plans').remove([fileName]);
                    if (storageError) console.warn('Failed to delete storage file:', storageError);
                }

                const { error: deleteError } = await getSupabase().from('lesson_plans').delete().eq('id', lessonId);
                if (deleteError) throw deleteError;

                showNotification('Lesson plan deleted successfully', 'success');
                loadAllLessons();
            } catch (error) {
                console.error('Error deleting lesson plan:', error);
                showNotification('Failed to delete lesson plan', 'error');
            }
        }

        async function handleLessonSubmit(event) {
            event.preventDefault();
            
            const lessonId = document.getElementById('lessonId').value;
            const title = document.getElementById('lessonTitle').value;
            const description = document.getElementById('lessonDescription').value;
            const gradeLevel = document.getElementById('lessonGradeLevel').value;
            const status = document.getElementById('lessonStatus').value;
            const fileInput = document.getElementById('lessonFile');

            try {
                let fileUrl = null;
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    fileUrl = await uploadFile(file, 'lesson-plans');
                }

                if (!lessonId && !fileUrl) {
                    showNotification('Please upload a lesson plan file', 'error');
                    return;
                }

                if (lessonId) {
                    const updates = {
                        title,
                        description,
                        grade_level: gradeLevel,
                        status,
                        updated_at: new Date().toISOString()
                    };
                    if (fileUrl) {
                        updates.file_url = fileUrl;
                    }

                    const { error } = await getSupabase().from('lesson_plans').update(updates).eq('id', lessonId);
                    if (error) throw error;
                    showNotification('Lesson plan updated successfully', 'success');
                } else {
                    const { error } = await getSupabase().from('lesson_plans').insert({
                        title,
                        description,
                        grade_level: gradeLevel,
                        status,
                        file_url: fileUrl,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    });
                    if (error) throw error;
                    showNotification('Lesson plan created successfully', 'success');
                }

                closeLessonModal();
                loadAllLessons();
            } catch (error) {
                console.error('Error saving lesson plan:', error);
                showNotification('Failed to save lesson plan', 'error');
            }
        }

        document.getElementById('lessonModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeLessonModal();
            }
        });

        document.addEventListener('DOMContentLoaded', async function() {
            currentUser = await checkAuthSession();
            if (!currentUser || currentUser.role !== 'admin') {
                redirectToLogin();
                return;
            }

            loadAllLessons();
        });
    </script>

</body>
</html>
