<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../Logo/MATHURO-LOGO-v2.png">
    <title>Lesson Plans - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared/js/supabase-lib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        maroon: '#800000',
                        'maroon-dark': '#600000',
                        'maroon-light': '#990000',
                        gold: '#FFD700',
                        'gold-light': '#FFED4E',
                        'gold-dark': '#B8860B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #800000 0%, #990000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #800000 0%, #990000 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.3);
        }
        
        .lesson-card {
            transition: all 0.3s ease;
        }
        
        .lesson-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #800000; border-radius: 3px; }
    </style>
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-6 py-4">
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="lg:hidden p-2 text-gray-600 hover:text-gray-900">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                
                <!-- Page Title -->
                <h1 class="text-2xl font-bold gradient-text">Lesson Plans</h1>
                
                <!-- Header Actions -->
                <div class="flex items-center space-x-4">
                    <button onclick="openAddLessonModal()" class="bg-maroon text-white px-4 py-2 rounded-lg hover:bg-maroon-dark transition-colors">
                        <i class="fas fa-plus mr-2"></i>Add Lesson Plan
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="p-6">
            <!-- Lesson Plans List -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-6">
                    <h2 class="text-lg font-semibold mb-4">All Lesson Plans</h2>
                    <div id="lessonsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Lesson plans will be dynamically loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Lesson Plan Modal -->
    <div id="lessonModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200">
                <h3 id="modalTitle" class="text-xl font-semibold">Add New Lesson Plan File</h3>
            </div>
            <form id="lessonForm" onsubmit="handleLessonSubmit(event)">
                <div class="p-6 space-y-4">
                    <input type="hidden" id="lessonId">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">File Name</label>
                        <input type="text" id="lessonTitle" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Enter file name">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea id="lessonDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Enter lesson description"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Module</label>
                            <input type="text" id="lessonModule" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="e.g. Module 1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Lesson (optional)</label>
                            <input type="text" id="lessonName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="e.g. Lesson 1">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Period Type</label>
                            <select id="lessonPeriodType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent">
                                <option value="">Select type</option>
                                <option value="week">Week</option>
                                <option value="month">Month</option>
                                <option value="quarter">Quarter</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Period Value</label>
                            <input type="text" id="lessonPeriodValue" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="e.g. 1, Jan, Q1">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Lesson Plan File</label>
                        <input type="file" id="lessonFile" accept=".pdf,.doc,.docx" class="w-full px-3 py-2 border border-gray-300 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-maroon file:text-white hover:file:bg-maroon-dark">
                    </div>
                </div>
                
                <div class="p-6 border-t border-gray-200 flex justify-end space-x-3">
                    <button type="button" onclick="closeLessonModal()" class="px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-maroon text-white rounded-lg hover:bg-maroon-dark">
                        <i id="submitIcon" class="fas fa-save mr-2"></i>
                        <span id="submitText">Save Lesson Plan File</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        let currentUser = null;

        const LESSON_PLAN_BUCKET = 'lesson-plans';
        const LESSON_PLAN_TABLE = 'lesson_plan_files';

        function formatFileSize(bytes) {
            if (!bytes || Number.isNaN(Number(bytes))) return 'Unknown size';
            const kb = 1024;
            const units = ['B', 'KB', 'MB', 'GB'];
            const index = Math.floor(Math.log(bytes) / Math.log(kb));
            return `${(bytes / (kb ** index)).toFixed(index === 0 ? 0 : 2)} ${units[index]}`;
        }

        function getFileTypeLabel(fileType, fileName) {
            if (fileType) return fileType;
            const extension = (fileName || '').split('.').pop();
            return extension ? `${extension.toUpperCase()} file` : 'Unknown type';
        }

        async function uploadLessonPlanFile(file, userId) {
            const supabase = getSupabase();
            const filePath = `${userId}/${Date.now()}_${file.name}`;

            const { error: uploadError } = await supabase
                .storage
                .from(LESSON_PLAN_BUCKET)
                .upload(filePath, file);

            if (uploadError) throw uploadError;

            const { data: publicUrlData } = supabase
                .storage
                .from(LESSON_PLAN_BUCKET)
                .getPublicUrl(filePath);

            return {
                filePath,
                fileUrl: publicUrlData.publicUrl,
                fileType: file.type || null,
                fileSize: file.size || null
            };
        }

        // Lesson plan management functions
        async function loadAllLessons() {
            try {
                const lessonsList = document.getElementById('lessonsList');
                lessonsList.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-maroon"></div>
                        <p class="mt-4 text-gray-600">Loading lesson plans...</p>
                    </div>
                `;

                const { data: lessons, error } = await getSupabase().from(LESSON_PLAN_TABLE).select(`
                    id,
                    user_id,
                    file_name,
                    file_path,
                    file_url,
                    file_type,
                    file_size,
                    description,
                    module_name,
                    lesson_name,
                    period_type,
                    period_value,
                    uploaded_at,
                    uploader:user_id (full_name, email)
                `).order('uploaded_at', { ascending: false });

                if (error) throw error;

                if (lessons.length === 0) {
                    lessonsList.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i class="fas fa-file-alt text-6xl text-gray-300 mb-4"></i>
                            <h3 class="text-lg font-medium text-gray-900 mb-2">No Lesson Plans Found</h3>
                            <p class="text-gray-500 mb-6">Get started by uploading your first lesson plan</p>
                            <button onclick="openAddLessonModal()" class="bg-maroon text-white px-4 py-2 rounded-lg hover:bg-maroon-dark">
                                <i class="fas fa-plus mr-2"></i>Add First Lesson Plan
                            </button>
                        </div>
                    `;
                    return;
                }

                lessonsList.innerHTML = lessons.map(lesson => `
                    <div class="lesson-card bg-white border border-gray-200 rounded-lg p-6 hover:shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-semibold text-gray-900">${escapeHtml(lesson.file_name)}</h3>
                            <span class="px-3 py-1 text-xs font-medium rounded-full bg-maroon/10 text-maroon">Lesson File</span>
                        </div>
                        
                        <p class="text-gray-600 text-sm mb-4">${escapeHtml(lesson.description || 'No description')}</p>
                        
                        <div class="space-y-2 text-sm text-gray-500 mb-6">
                            <div class="flex items-center">
                                <i class="fas fa-book mr-2"></i>
                                <span>Module: ${escapeHtml(lesson.module_name || '-')}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-book-open mr-2"></i>
                                <span>Lesson: ${escapeHtml(lesson.lesson_name || '-')}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-calendar-alt mr-2"></i>
                                <span>Period: ${escapeHtml(lesson.period_type || '-')} ${escapeHtml(lesson.period_value || '')}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-user mr-2"></i>
                                <span>Uploaded by: ${escapeHtml(lesson.uploader?.full_name || lesson.uploader?.email || 'Unknown')}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-file-alt mr-2"></i>
                                <span>${escapeHtml(getFileTypeLabel(lesson.file_type, lesson.file_name))} • ${formatFileSize(lesson.file_size)}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-calendar mr-2"></i>
                                <span>${new Date(lesson.uploaded_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        
                        <div class="flex space-x-3">
                            <a href="${lesson.file_url}" target="_blank" class="flex-1 px-3 py-2 text-sm bg-blue-100 text-blue-800 rounded-lg hover:bg-blue-200">
                                <i class="fas fa-download mr-1"></i>Download
                            </a>
                            <button onclick="editLesson('${lesson.id}')" class="flex-1 px-3 py-2 text-sm bg-green-100 text-green-800 rounded-lg hover:bg-green-200">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                            <button onclick="deleteLesson('${lesson.id}')" class="flex-1 px-3 py-2 text-sm bg-red-100 text-red-800 rounded-lg hover:bg-red-200">
                                <i class="fas fa-trash mr-1"></i>Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading lessons:', error);
                showNotification('Failed to load lesson plans', 'error');
            }
        }

        function openAddLessonModal() {
            document.getElementById('modalTitle').textContent = 'Add New Lesson Plan File';
            document.getElementById('submitText').textContent = 'Save Lesson Plan File';
            document.getElementById('submitIcon').className = 'fas fa-save mr-2';
            document.getElementById('lessonForm').reset();
            document.getElementById('lessonId').value = '';
            document.getElementById('lessonModal').classList.remove('hidden');
        }

        function closeLessonModal() {
            document.getElementById('lessonModal').classList.add('hidden');
        }

        async function editLesson(lessonId) {
            try {
                const { data: lesson, error } = await getSupabase().from(LESSON_PLAN_TABLE).select('*').eq('id', lessonId).single();
                
                if (error) throw error;

                document.getElementById('modalTitle').textContent = 'Edit Lesson Plan File';
                document.getElementById('submitText').textContent = 'Update Lesson Plan File';
                document.getElementById('submitIcon').className = 'fas fa-edit mr-2';
                document.getElementById('lessonId').value = lesson.id;
                document.getElementById('lessonTitle').value = lesson.file_name;
                document.getElementById('lessonDescription').value = lesson.description || '';
                document.getElementById('lessonModule').value = lesson.module_name || '';
                document.getElementById('lessonName').value = lesson.lesson_name || '';
                document.getElementById('lessonPeriodType').value = lesson.period_type || '';
                document.getElementById('lessonPeriodValue').value = lesson.period_value || '';
                document.getElementById('lessonModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error fetching lesson:', error);
                showNotification('Failed to load lesson details', 'error');
            }
        }

        async function deleteLesson(lessonId) {
            if (!confirm('Are you sure you want to delete this lesson plan? This action cannot be undone.')) {
                return;
            }

            try {
                const { data: lesson, error: fetchError } = await getSupabase().from(LESSON_PLAN_TABLE).select('file_path').eq('id', lessonId).single();
                if (fetchError) throw fetchError;

                if (lesson.file_path) {
                    const { error: storageError } = await getSupabase().storage.from(LESSON_PLAN_BUCKET).remove([lesson.file_path]);
                    if (storageError) console.warn('Failed to delete storage file:', storageError);
                }

                const { error: deleteError } = await getSupabase().from(LESSON_PLAN_TABLE).delete().eq('id', lessonId);
                if (deleteError) throw deleteError;

                showNotification('Lesson plan deleted successfully', 'success');
                loadAllLessons();
            } catch (error) {
                console.error('Error deleting lesson plan:', error);
                showNotification('Failed to delete lesson plan', 'error');
            }
        }

        async function handleLessonSubmit(event) {
            event.preventDefault();
            
            const lessonId = document.getElementById('lessonId').value;
            const title = document.getElementById('lessonTitle').value;
            const description = document.getElementById('lessonDescription').value;
            const moduleName = document.getElementById('lessonModule').value;
            const lessonName = document.getElementById('lessonName').value;
            const periodType = document.getElementById('lessonPeriodType').value;
            const periodValue = document.getElementById('lessonPeriodValue').value;
            const fileInput = document.getElementById('lessonFile');

            try {
                let uploadedFile = null;
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    uploadedFile = await uploadLessonPlanFile(file, currentUser.id);
                }

                if (!lessonId && !uploadedFile) {
                    showNotification('Please upload a lesson plan file', 'error');
                    return;
                }

                if (lessonId) {
                    const { data: existingLesson, error: existingError } = await getSupabase()
                        .from(LESSON_PLAN_TABLE)
                        .select('file_path')
                        .eq('id', lessonId)
                        .single();

                    if (existingError) throw existingError;

                    const updates = {
                        file_name: title,
                        description,
                        module_name: moduleName || null,
                        lesson_name: lessonName || null,
                        period_type: periodType || null,
                        period_value: periodValue || null
                    };

                    if (uploadedFile) {
                        updates.file_url = uploadedFile.fileUrl;
                        updates.file_path = uploadedFile.filePath;
                        updates.file_type = uploadedFile.fileType;
                        updates.file_size = uploadedFile.fileSize;

                        if (existingLesson?.file_path) {
                            const { error: removeError } = await getSupabase()
                                .storage
                                .from(LESSON_PLAN_BUCKET)
                                .remove([existingLesson.file_path]);

                            if (removeError) {
                                console.warn('Old file removal failed:', removeError);
                            }
                        }
                    }

                    const { error } = await getSupabase().from(LESSON_PLAN_TABLE).update(updates).eq('id', lessonId);
                    if (error) throw error;
                    showNotification('Lesson plan updated successfully', 'success');
                } else {
                    const { error } = await getSupabase().from(LESSON_PLAN_TABLE).insert({
                        user_id: currentUser.id,
                        file_name: title,
                        description,
                        module_name: moduleName || null,
                        lesson_name: lessonName || null,
                        period_type: periodType || null,
                        period_value: periodValue || null,
                        file_url: uploadedFile.fileUrl,
                        file_path: uploadedFile.filePath,
                        file_type: uploadedFile.fileType,
                        file_size: uploadedFile.fileSize,
                        uploaded_at: new Date().toISOString()
                    });
                    if (error) throw error;
                    showNotification('Lesson plan created successfully', 'success');
                }

                closeLessonModal();
                loadAllLessons();
            } catch (error) {
                console.error('Error saving lesson plan:', error);
                showNotification('Failed to save lesson plan', 'error');
            }
        }

        document.getElementById('lessonModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeLessonModal();
            }
        });

        document.addEventListener('DOMContentLoaded', async function() {
            currentUser = await checkAuthSession();
            if (!currentUser || currentUser.role !== 'admin') {
                redirectToLogin();
                return;
            }

            loadAllLessons();
        });
    </script>

</body>
</html>
