<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../Logo/MATHURO-LOGO-v2.png">
    <title>Manage Modules - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared/js/supabase-lib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        maroon: '#800000',
                        'maroon-dark': '#600000',
                        'maroon-light': '#990000',
                        gold: '#FFD700',
                        'gold-light': '#FFED4E',
                        'gold-dark': '#B8860B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #800000 0%, #990000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #800000 0%, #990000 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.3);
        }
        
        .module-card {
            transition: all 0.3s ease;
        }
        
        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .upload-zone:hover {
            border-color: #800000;
            background: rgba(128, 0, 0, 0.05);
        }
        
        .upload-zone.drag-over {
            border-color: #800000;
            background: rgba(128, 0, 0, 0.1);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #800000; border-radius: 3px; }
    </style>
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-6 py-4">
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="lg:hidden p-2 text-gray-600 hover:text-gray-900">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                
                <!-- Page Title -->
                <h1 class="text-2xl font-bold gradient-text">Manage Modules</h1>
                
                <!-- Header Actions -->
                <div class="flex items-center space-x-4">
                    <button onclick="openAddModuleModal()" class="bg-maroon text-white px-4 py-2 rounded-lg hover:bg-maroon-dark transition-colors">
                        <i class="fas fa-plus mr-2"></i>Add Module
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="p-6">
            <!-- Modules List -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-6">
                    <h2 class="text-lg font-semibold mb-4">All Modules</h2>
                    <div class="flex flex-wrap gap-2 mb-6" id="quarterTabs">
                        <button type="button" class="quarter-tab px-4 py-2 rounded-lg text-sm font-medium bg-maroon text-white" data-quarter="all">All Modules</button>
                        <button type="button" class="quarter-tab px-4 py-2 rounded-lg text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-maroon/40" data-quarter="1">Quarter 1</button>
                        <button type="button" class="quarter-tab px-4 py-2 rounded-lg text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-maroon/40" data-quarter="2">Quarter 2</button>
                        <button type="button" class="quarter-tab px-4 py-2 rounded-lg text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-maroon/40" data-quarter="3">Quarter 3</button>
                        <button type="button" class="quarter-tab px-4 py-2 rounded-lg text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-maroon/40" data-quarter="4">Quarter 4</button>
                    </div>
                    <div id="modulesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Modules will be dynamically loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Module Modal -->
    <div id="moduleModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200">
                <h3 id="modalTitle" class="text-xl font-semibold">Add New Module</h3>
            </div>
            <form id="moduleForm" onsubmit="handleModuleSubmit(event)">
                <div class="p-6 space-y-4">
                    <input type="hidden" id="moduleId">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Module Name</label>
                        <input type="text" id="moduleName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Enter module name">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea id="moduleDescription" required rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Enter module description"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Grade Level</label>
                            <select id="moduleGradeLevel" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent">
                                <option value="">Select grade level</option>
                                <option value="1">Grade 1</option>
                                <option value="2">Grade 2</option>
                                <option value="3">Grade 3</option>
                                <option value="4">Grade 4</option>
                                <option value="5">Grade 5</option>
                                <option value="6">Grade 6</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Quarter</label>
                            <select id="moduleQuarter" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent">
                                <option value="">Select quarter</option>
                                <option value="1">Quarter 1</option>
                                <option value="2">Quarter 2</option>
                                <option value="3">Quarter 3</option>
                                <option value="4">Quarter 4</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                            <select id="moduleStatus" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent">
                                <option value="active">Active</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Module Cover Image (Optional)</label>
                        <input type="file" id="moduleImage" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-maroon file:text-white hover:file:bg-maroon-dark">
                    </div>

                    <div class="border border-amber-200 bg-amber-50 rounded-lg p-4">
                        <div class="flex items-center space-x-2 mb-3">
                            <i class="fas fa-clipboard-list text-amber-700"></i>
                            <h4 class="text-sm font-semibold text-gray-800">Optional Quiz Setup</h4>
                        </div>
                        <p class="text-xs text-gray-600 mb-4">Add a quiz while creating the module so students can access it from module view.</p>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Quiz URL</label>
                                <input type="url" id="moduleQuizUrl" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="https://forms.google.com/...">
                                <p class="text-xs text-gray-500 mt-1">Leave blank if no quiz is needed yet.</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Quiz Title</label>
                                    <input type="text" id="moduleQuizTitle" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="Auto: Module Quiz">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Total Items</label>
                                    <input type="number" id="moduleQuizTotalItems" min="1" value="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="10">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Passing Score</label>
                                    <input type="number" id="moduleQuizPassingScore" min="0" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-maroon focus:border-transparent" placeholder="0">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="p-6 border-t border-gray-200 flex justify-end space-x-3">
                    <button type="button" onclick="closeModuleModal()" class="px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-maroon text-white rounded-lg hover:bg-maroon-dark">
                        <i id="submitIcon" class="fas fa-save mr-2"></i>
                        <span id="submitText">Save Module</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        let currentUser = null;
        let activeQuarterFilter = 'all';
        let editingLinkedQuizId = null;
        const unsupportedQuizColumns = new Set(JSON.parse(localStorage.getItem('unsupported_quizzes_columns') || '[]'));

        function normalizeGradeValue(value) {
            if (value === null || value === undefined) return null;
            const str = String(value).trim().toLowerCase();
            if (!str) return null;
            return str.startsWith('grade') ? str.replace(/^grade\s*/, '') : str;
        }

        function normalizeQuarterValue(value) {
            if (value === null || value === undefined || value === '') return '';
            const quarter = String(value).trim().replace(/[^0-9]/g, '');
            return ['1', '2', '3', '4'].includes(quarter) ? quarter : '';
        }

        function getModuleQuarter(module) {
            return normalizeQuarterValue(module?.quarter ?? module?.module_quarter ?? module?.quarter_number);
        }

        function getQuarterLabel(module) {
            const quarter = getModuleQuarter(module);
            return quarter ? `Quarter ${quarter}` : 'No Quarter';
        }

        function getMissingColumnName(error) {
            const message = `${error?.message || ''} ${error?.details || ''} ${error?.hint || ''}`;
            const patterns = [
                /Could not find the '([^']+)' column/i,
                /column '([^']+)'/i,
                /'([^']+)' column/i
            ];

            for (const pattern of patterns) {
                const match = message.match(pattern);
                if (match?.[1]) return match[1];
            }

            return null;
        }

        function rememberUnsupportedQuizColumn(columnName) {
            if (!columnName) return;
            unsupportedQuizColumns.add(columnName);
            localStorage.setItem('unsupported_quizzes_columns', JSON.stringify(Array.from(unsupportedQuizColumns)));
        }

        function stripUnsupportedQuizColumns(payload) {
            const sanitized = { ...payload };
            unsupportedQuizColumns.forEach(column => {
                if (column in sanitized) delete sanitized[column];
            });
            return sanitized;
        }

        async function insertQuizWithFallback(payload) {
            const workingPayload = stripUnsupportedQuizColumns(payload);
            let lastError = null;

            for (let attempt = 0; attempt < 4; attempt++) {
                const result = await getSupabase()
                    .from('quizzes')
                    .insert(workingPayload)
                    .select()
                    .single();

                if (!result.error) return result;

                const missingColumn = getMissingColumnName(result.error);
                if (!missingColumn || !(missingColumn in workingPayload)) {
                    lastError = result.error;
                    break;
                }

                rememberUnsupportedQuizColumn(missingColumn);
                delete workingPayload[missingColumn];
                lastError = result.error;
            }

            throw lastError || new Error('Failed to create quiz');
        }

        async function updateLinkedQuizzesWithFallback(moduleId, payload) {
            const workingPayload = stripUnsupportedQuizColumns(payload);
            let lastError = null;

            for (let attempt = 0; attempt < 4; attempt++) {
                const result = await getSupabase()
                    .from('quizzes')
                    .update(workingPayload)
                    .eq('module_id', moduleId);

                if (!result.error) return result;

                const missingColumn = getMissingColumnName(result.error);
                if (!missingColumn || !(missingColumn in workingPayload)) {
                    lastError = result.error;
                    break;
                }

                rememberUnsupportedQuizColumn(missingColumn);
                delete workingPayload[missingColumn];
                lastError = result.error;
            }

            throw lastError || new Error('Failed to sync linked quizzes');
        }

        async function updateQuizByIdWithFallback(quizId, payload) {
            const workingPayload = stripUnsupportedQuizColumns(payload);
            let lastError = null;

            for (let attempt = 0; attempt < 4; attempt++) {
                const result = await getSupabase()
                    .from('quizzes')
                    .update(workingPayload)
                    .eq('id', quizId);

                if (!result.error) return result;

                const missingColumn = getMissingColumnName(result.error);
                if (!missingColumn || !(missingColumn in workingPayload)) {
                    lastError = result.error;
                    break;
                }

                rememberUnsupportedQuizColumn(missingColumn);
                delete workingPayload[missingColumn];
                lastError = result.error;
            }

            throw lastError || new Error('Failed to update quiz');
        }

        function resetOptionalQuizFields() {
            editingLinkedQuizId = null;
            document.getElementById('moduleQuizUrl').value = '';
            document.getElementById('moduleQuizTitle').value = '';
            document.getElementById('moduleQuizTotalItems').value = '10';
            document.getElementById('moduleQuizPassingScore').value = '0';
        }

        async function loadLinkedQuizForModule(moduleId) {
            resetOptionalQuizFields();

            const { data: linkedQuiz, error } = await getSupabase()
                .from('quizzes')
                .select('*')
                .eq('module_id', moduleId)
                .order('created_at', { ascending: true })
                .limit(1)
                .maybeSingle();

            if (error) {
                console.warn('Could not load linked quiz for module:', error);
                return;
            }

            if (!linkedQuiz) return;

            editingLinkedQuizId = linkedQuiz.id;
            document.getElementById('moduleQuizUrl').value = linkedQuiz.quiz_url || '';
            document.getElementById('moduleQuizTitle').value = linkedQuiz.title || '';
            document.getElementById('moduleQuizTotalItems').value = String(linkedQuiz.total_items || 10);
            document.getElementById('moduleQuizPassingScore').value = String(linkedQuiz.passing_score || 0);
        }

        function isValidHttpUrl(value) {
            if (!value) return false;
            try {
                const parsed = new URL(value);
                return parsed.protocol === 'http:' || parsed.protocol === 'https:';
            } catch {
                return false;
            }
        }

        function setQuarterFilter(quarter) {
            activeQuarterFilter = quarter || 'all';
            updateQuarterTabs();
            loadAllModules();
        }

        function updateQuarterTabs() {
            document.querySelectorAll('.quarter-tab').forEach(tab => {
                const isActive = (tab.dataset.quarter || 'all') === activeQuarterFilter;
                tab.classList.toggle('bg-maroon', isActive);
                tab.classList.toggle('text-white', isActive);
                tab.classList.toggle('bg-white', !isActive);
                tab.classList.toggle('text-gray-700', !isActive);
                tab.classList.toggle('border', !isActive);
                tab.classList.toggle('border-gray-200', !isActive);
            });
        }

        async function ensureModuleSectionGradeConsistency(moduleId, selectedGradeLevelText) {
            if (!moduleId) return;

            const { data: currentModule, error: moduleError } = await getSupabase()
                .from('modules')
                .select('id, section_id')
                .eq('id', moduleId)
                .maybeSingle();

            if (moduleError) throw moduleError;
            if (!currentModule?.section_id) return;

            const { data: section, error: sectionError } = await getSupabase()
                .from('sections')
                .select('id, name, grade_level_id')
                .eq('id', currentModule.section_id)
                .maybeSingle();

            if (sectionError) throw sectionError;
            if (!section?.grade_level_id) {
                throw new Error('Existing section scope is invalid. Please fix section assignment first.');
            }

            const { data: gradeLevel, error: gradeError } = await getSupabase()
                .from('grade_levels')
                .select('id, name')
                .eq('id', section.grade_level_id)
                .maybeSingle();

            if (gradeError) throw gradeError;

            const selectedNormalized = normalizeGradeValue(selectedGradeLevelText);
            const sectionGradeNormalized = normalizeGradeValue(gradeLevel?.name);

            if (!selectedNormalized || !sectionGradeNormalized || selectedNormalized !== sectionGradeNormalized) {
                throw new Error(`This module is scoped to section "${section.name}" (${gradeLevel?.name || 'unknown grade'}). Choose the matching grade level.`);
            }
        }

        function formatGradeLabel(gradeLevel) {
            if (gradeLevel === null || gradeLevel === undefined) return 'N/A';
            const gradeText = String(gradeLevel).trim();
            if (!gradeText) return 'N/A';
            return /^grade\s+/i.test(gradeText) ? gradeText : `Grade ${gradeText}`;
        }

        function resolveModuleGradeLabel(module, gradeLevelMap) {
            const formatted = formatGradeLabel(module.grade_level);
            if (formatted !== 'N/A') return formatted;

            if (module.grade_level_id && gradeLevelMap[module.grade_level_id]) {
                return gradeLevelMap[module.grade_level_id];
            }

            return 'N/A';
        }

        // Module management functions
        async function loadAllModules() {
            try {
                const modulesList = document.getElementById('modulesList');
                modulesList.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-maroon"></div>
                        <p class="mt-4 text-gray-600">Loading modules...</p>
                    </div>
                `;

                // Fetch all modules (admin sees all)
                const { data: modules, error } = await getSupabase()
                    .from('modules')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const teacherIds = [...new Set((modules || []).map(module => module.teacher_id).filter(Boolean))];
                const gradeLevelIds = [...new Set((modules || []).map(module => module.grade_level_id).filter(Boolean))];
                const teacherMap = {};
                const gradeLevelMap = {};

                if (teacherIds.length > 0) {
                    const { data: teachers } = await getSupabase()
                        .from('users')
                        .select('id, full_name')
                        .in('id', teacherIds);

                    (teachers || []).forEach(teacher => {
                        teacherMap[teacher.id] = teacher;
                    });
                }

                if (gradeLevelIds.length > 0) {
                    const { data: gradeLevels } = await getSupabase()
                        .from('grade_levels')
                        .select('id, name')
                        .in('id', gradeLevelIds);

                    (gradeLevels || []).forEach(gradeLevel => {
                        gradeLevelMap[gradeLevel.id] = gradeLevel.name;
                    });
                }

                if (modules.length === 0) {
                    modulesList.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i class="fas fa-book-open text-6xl text-gray-300 mb-4"></i>
                            <h3 class="text-lg font-medium text-gray-900 mb-2">No Modules Found</h3>
                            <p class="text-gray-500 mb-6">Get started by creating your first module</p>
                            <button onclick="openAddModuleModal()" class="bg-maroon text-white px-4 py-2 rounded-lg hover:bg-maroon-dark">
                                <i class="fas fa-plus mr-2"></i>Add First Module
                            </button>
                        </div>
                    `;
                    return;
                }

                const filteredModules = activeQuarterFilter === 'all'
                    ? modules
                    : modules.filter(module => getModuleQuarter(module) === activeQuarterFilter);

                if (filteredModules.length === 0) {
                    modulesList.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i class="fas fa-calendar-alt text-6xl text-gray-300 mb-4"></i>
                            <h3 class="text-lg font-medium text-gray-900 mb-2">No Modules in This Quarter</h3>
                            <p class="text-gray-500">Try another quarter tab or add a new module.</p>
                        </div>
                    `;
                    return;
                }

                modulesList.innerHTML = filteredModules.map(module => `
                    <div class="module-card bg-white border-2 border-maroon/20 rounded-xl p-6 hover:shadow-xl hover:border-maroon/40 transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-bold text-maroon">${module.title || module.name || 'Untitled Module'}</h3>
                            <span class="px-3 py-1 text-xs font-semibold rounded-full ${
                                (module.status === 'active' || module.status === 'published') ? 'bg-maroon text-white' : 'bg-gray-100 text-gray-600'
                            }">${module.status || 'draft'}</span>
                        </div>
                        
                        <p class="text-gray-700 text-sm mb-4 leading-relaxed">${module.description || 'No description'}</p>
                        
                        <div class="space-y-2 text-sm text-gray-600 mb-6">
                            <div class="flex items-center">
                                <i class="fas fa-calendar-alt mr-2 text-maroon"></i>
                                <span>${getQuarterLabel(module)}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-graduation-cap mr-2 text-maroon"></i>
                                <span>${resolveModuleGradeLabel(module, gradeLevelMap)}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-user mr-2 text-maroon"></i>
                                <span>Created by: ${teacherMap[module.teacher_id]?.full_name || 'Unknown'}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fas fa-calendar mr-2 text-maroon"></i>
                                <span>${new Date(module.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        
                        <div class="flex space-x-3">
                            <button onclick="editModule('${module.id}')" class="flex-1 px-3 py-2 text-sm bg-maroon text-white rounded-lg hover:bg-maroon-dark transition-colors">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                            <button onclick="deleteModule('${module.id}')" class="flex-1 px-3 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                                <i class="fas fa-trash mr-1"></i>Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading modules:', error);
                showToast('Failed to load modules', 'error');
            }
        }

        function openAddModuleModal() {
            document.getElementById('modalTitle').textContent = 'Add New Module';
            document.getElementById('submitText').textContent = 'Save Module';
            document.getElementById('submitIcon').className = 'fas fa-save mr-2';
            document.getElementById('moduleForm').reset();
            document.getElementById('moduleId').value = '';
            resetOptionalQuizFields();
            document.getElementById('moduleModal').classList.remove('hidden');
        }

        function closeModuleModal() {
            document.getElementById('moduleModal').classList.add('hidden');
        }

        async function editModule(moduleId) {
            try {
                const { data: module, error } = await getSupabase().from('modules').select('*').eq('id', moduleId).single();
                
                if (error) throw error;

                document.getElementById('modalTitle').textContent = 'Edit Module';
                document.getElementById('submitText').textContent = 'Update Module';
                document.getElementById('submitIcon').className = 'fas fa-edit mr-2';
                document.getElementById('moduleId').value = module.id;
                document.getElementById('moduleName').value = module.title || module.name || '';
                document.getElementById('moduleDescription').value = module.description;
                document.getElementById('moduleGradeLevel').value = module.grade_level;
                document.getElementById('moduleQuarter').value = getModuleQuarter(module);
                document.getElementById('moduleStatus').value = module.status;
                await loadLinkedQuizForModule(module.id);
                document.getElementById('moduleModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error fetching module:', error);
                showToast('Failed to load module details', 'error');
            }
        }

        async function deleteModule(moduleId) {
            if (!confirm('Are you sure you want to delete this module? This action cannot be undone.')) {
                return;
            }

            try {
                const { error } = await getSupabase().from('modules').delete().eq('id', moduleId);
                
                if (error) throw error;

                showToast('Module deleted successfully', 'success');
                loadAllModules();
            } catch (error) {
                console.error('Error deleting module:', error);
                showToast('Failed to delete module', 'error');
            }
        }

        async function handleModuleSubmit(event) {
            event.preventDefault();
            
            const moduleId = document.getElementById('moduleId').value;
            const title = document.getElementById('moduleName').value;
            const description = document.getElementById('moduleDescription').value;
            const gradeLevel = document.getElementById('moduleGradeLevel').value;
            const quarter = document.getElementById('moduleQuarter').value;
            const status = document.getElementById('moduleStatus').value;
            const fileInput = document.getElementById('moduleImage');
            const quizUrl = document.getElementById('moduleQuizUrl').value.trim();
            const quizTitleInput = document.getElementById('moduleQuizTitle').value.trim();
            const quizTotalItemsInput = parseInt(document.getElementById('moduleQuizTotalItems').value, 10);
            const quizPassingScoreInput = parseInt(document.getElementById('moduleQuizPassingScore').value, 10);

            try {
                if (!quarter) {
                    showToast('Please select a quarter', 'error');
                    return;
                }

                if (quizUrl && !isValidHttpUrl(quizUrl)) {
                    showToast('Please enter a valid quiz URL (http/https)', 'error');
                    return;
                }

                const quizTotalItems = Number.isFinite(quizTotalItemsInput) && quizTotalItemsInput > 0 ? quizTotalItemsInput : 10;
                const quizPassingScore = Number.isFinite(quizPassingScoreInput) && quizPassingScoreInput >= 0 ? quizPassingScoreInput : 0;

                if (quizPassingScore > quizTotalItems) {
                    showToast('Passing score cannot exceed total items', 'error');
                    return;
                }

                let imageUrl = null;
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    imageUrl = await uploadFile(file, 'modules');
                }

                if (moduleId) {
                    await ensureModuleSectionGradeConsistency(moduleId, gradeLevel);
                }

                if (moduleId) {
                    // Update existing module
                    const now = new Date().toISOString();
                    const updates = {
                        title,
                        description,
                        grade_level: gradeLevel,
                        quarter: Number(quarter),
                        status,
                        updated_at: now
                    };
                    if (imageUrl) {
                        updates.image_url = imageUrl;
                    }

                    const { error } = await getSupabase().from('modules').update(updates).eq('id', moduleId);
                    if (error) throw error;

                    // Keep linked quizzes in sync with module scope and visibility.
                    await updateLinkedQuizzesWithFallback(moduleId, {
                        quarter: Number(quarter),
                        grade_level: gradeLevel,
                        is_published: status === 'active',
                        updated_at: now
                    });

                    // Update a specific linked quiz if present in the optional quiz form,
                    // or create one if URL is provided and no linked quiz exists yet.
                    if (quizUrl) {
                        const quizTitle = quizTitleInput || `${title} Quiz`;
                        if (editingLinkedQuizId) {
                            await updateQuizByIdWithFallback(editingLinkedQuizId, {
                                title: quizTitle,
                                description: description || `Quiz for ${title}`,
                                quiz_url: quizUrl,
                                quarter: Number(quarter),
                                grade_level: gradeLevel,
                                total_items: quizTotalItems,
                                passing_score: quizPassingScore,
                                is_published: status === 'active',
                                updated_at: now
                            });
                        } else {
                            const createdQuizResult = await insertQuizWithFallback({
                                title: quizTitle,
                                description: description || `Quiz for ${title}`,
                                quiz_url: quizUrl,
                                module_id: moduleId,
                                quarter: Number(quarter),
                                grade_level: gradeLevel,
                                total_items: quizTotalItems,
                                passing_score: quizPassingScore,
                                is_published: status === 'active',
                                teacher_id: currentUser.id,
                                created_at: now,
                                updated_at: now
                            });
                            editingLinkedQuizId = createdQuizResult?.data?.id || null;
                        }
                    }

                    showToast('Module updated successfully', 'success');
                } else {
                    // Create new module
                    const now = new Date().toISOString();
                    const { data: createdModule, error } = await getSupabase().from('modules').insert({
                        title,
                        description,
                        grade_level: gradeLevel,
                        quarter: Number(quarter),
                        status,
                        created_at: now,
                        updated_at: now,
                        image_url: imageUrl
                    }).select().single();
                    if (error) throw error;

                    if (quizUrl && createdModule?.id) {
                        const quizTitle = quizTitleInput || `${title} Quiz`;
                        await insertQuizWithFallback({
                            title: quizTitle,
                            description: description || `Quiz for ${title}`,
                            quiz_url: quizUrl,
                            module_id: createdModule.id,
                            quarter: Number(quarter),
                            grade_level: gradeLevel,
                            total_items: quizTotalItems,
                            passing_score: quizPassingScore,
                            is_published: status === 'active',
                            teacher_id: currentUser.id,
                            created_at: now,
                            updated_at: now
                        });
                    }

                    showToast('Module created successfully', 'success');
                }

                closeModuleModal();
                loadAllModules();
            } catch (error) {
                console.error('Error saving module:', error);
                showToast('Failed to save module', 'error');
            }
        }

        // Close modal on overlay click
        document.getElementById('moduleModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeModuleModal();
            }
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            currentUser = await checkAuthSession();
            if (!currentUser || currentUser.role !== 'admin') {
                redirectToLogin();
                return;
            }

            document.querySelectorAll('.quarter-tab').forEach(tab => {
                tab.addEventListener('click', () => setQuarterFilter(tab.dataset.quarter || 'all'));
            });
            updateQuarterTabs();

            loadAllModules();
        });
    </script>

</body>
</html>
