<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account - LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 480px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .header p {
            color: #718096;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #f7fafc;
        }

        .status-message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }

        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
            display: block;
        }

        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
            display: block;
        }

        .status-message.info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-hint {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Create Admin Account</h1>
            <p>Create a system administrator account for your LMS</p>
        </div>

        <form id="createAdminForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="admin@example.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input 
                    type="text" 
                    id="fullName" 
                    name="fullName" 
                    placeholder="System Administrator" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter a strong password" 
                    required
                    minlength="8"
                >
                <div class="password-hint">
                    Password must be at least 8 characters long and include a mix of letters, numbers, and symbols
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="Confirm your password" 
                    required
                    minlength="8"
                >
            </div>

            <button type="submit" class="btn-primary" id="createBtn">
                <span id="btnText">Create Admin Account</span>
                <span id="spinner" class="loading-spinner" style="display: none;"></span>
            </button>
        </form>

        <div id="statusMessage" class="status-message"></div>

        <button type="button" class="btn-secondary" id="checkExistingBtn">
            Check Existing Admin Accounts
        </button>
    </div>

    <!-- Supabase JavaScript CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config -->
    <script src="public/shared/js/config.js"></script>
    <script>
        // Initialize Supabase client
        const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        // Form submission handler
        document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const fullName = document.getElementById('fullName').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showStatus('Passwords do not match', 'error');
                return;
            }

            // Validate password strength
            if (password.length < 8) {
                showStatus('Password must be at least 8 characters long', 'error');
                return;
            }

            // Show loading state
            setLoading(true);
            showStatus('Creating admin account...', 'info');

            try {
                // Step 1: Create user in Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: 'admin'
                        },
                        emailRedirectTo: window.location.origin
                    }
                });

                if (authError) {
                    throw authError;
                }

                if (authData.user) {
                    // Step 2: Wait for user to be created in auth.users table (there might be a slight delay)
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    // Step 3: Ensure user exists in public.users table with admin role
                    const { data: userData, error: userError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', authData.user.id)
                        .single();

                    if (userError || !userData) {
                        // If user doesn't exist in public.users table, create them
                        const { error: insertError } = await supabase
                            .from('users')
                            .insert({
                                id: authData.user.id,
                                email: email,
                                full_name: fullName,
                                role: 'admin',
                                avatar_url: null,
                                is_active: true,
                                created_at: new Date().toISOString(),
                                updated_at: new Date().toISOString()
                            });

                        if (insertError) {
                            throw insertError;
                        }
                    } else {
                        // If user exists, ensure role is set to admin
                        if (userData.role !== 'admin') {
                            const { error: updateError } = await supabase
                                .from('users')
                                .update({ 
                                    role: 'admin',
                                    full_name: fullName,
                                    updated_at: new Date().toISOString()
                                })
                                .eq('id', authData.user.id);

                            if (updateError) {
                                throw updateError;
                            }
                        }
                    }

                    showStatus(`Admin account created successfully! <br><br>
                        <strong>Email:</strong> ${email}<br>
                        <strong>Full Name:</strong> ${fullName}<br>
                        <strong>User ID:</strong> ${authData.user.id}<br><br>
                        The user will receive a confirmation email to verify their account.`, 'success');
                    
                    // Reset form
                    document.getElementById('createAdminForm').reset();
                }
            } catch (error) {
                showStatus(`Error creating admin account: ${error.message}`, 'error');
                console.error('Admin creation error:', error);
            } finally {
                setLoading(false);
            }
        });

        // Check existing admin accounts
        document.getElementById('checkExistingBtn').addEventListener('click', async () => {
            try {
                const { data: admins, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('role', 'admin')
                    .order('created_at', { ascending: false });

                if (error) {
                    throw error;
                }

                if (admins.length === 0) {
                    showStatus('No admin accounts found. You should create one.', 'info');
                } else {
                    let message = `<strong>Found ${admins.length} admin account${admins.length > 1 ? 's' : ''}:</strong><br><br>`;
                    admins.forEach(admin => {
                        message += `<strong>${admin.full_name}</strong><br>`;
                        message += `Email: ${admin.email}<br>`;
                        message += `Created: ${new Date(admin.created_at).toLocaleString()}<br>`;
                        message += `Active: ${admin.is_active ? 'Yes' : 'No'}<br><br>`;
                    });
                    showStatus(message, 'success');
                }
            } catch (error) {
                showStatus(`Error checking admin accounts: ${error.message}`, 'error');
                console.error('Check admins error:', error);
            }
        });

        // Show status message
        function showStatus(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.innerHTML = message;
            statusElement.className = `status-message ${type}`;
            statusElement.style.display = 'block';
        }

        // Set loading state
        function setLoading(isLoading) {
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const createBtn = document.getElementById('createBtn');
            const checkBtn = document.getElementById('checkExistingBtn');

            createBtn.disabled = isLoading;
            checkBtn.disabled = isLoading;
            
            if (isLoading) {
                btnText.textContent = 'Creating...';
                spinner.style.display = 'inline-block';
            } else {
                btnText.textContent = 'Create Admin Account';
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
