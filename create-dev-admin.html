<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Dev Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Create Developer Admin Account</h1>
        <p class="text-gray-600 mb-6">Click the button below to create a temporary developer admin account for testing purposes.</p>
        <button id="createAdminBtn" class="w-full bg-red-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-red-700 transition-colors">
            Create Dev Admin Account
        </button>
        <p class="text-sm text-gray-500 mt-4">This account will be stored in your browser's localStorage.</p>
    </div>

    <script>
        document.getElementById('createAdminBtn').addEventListener('click', function() {
            const devAdmin = {
                id: 'dev-admin',
                email: 'admin@mathturo.com',
                role: 'admin',
                fullName: 'MathTuro Admin'
            };
            
            localStorage.setItem('user', JSON.stringify(devAdmin));
            
            // Show success message
            this.textContent = '✅ Dev Admin Account Created!';
            this.classList.remove('bg-red-600', 'hover:bg-red-700');
            this.classList.add('bg-green-600');
            
            // Redirect to admin dashboard after 2 seconds
            setTimeout(() => {
                window.location.href = '/admin/dashboard.html';
            }, 2000);
        });
    </script>
</body>
</html>
