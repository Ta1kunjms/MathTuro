<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Admin Record - LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .header p {
            color: #718096;
            font-size: 14px;
            line-height: 1.5;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }

        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
            display: block;
        }

        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
            display: block;
        }

        .status-message.info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-details {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
        }

        .admin-details p {
            margin: 8px 0;
            color: #2d3748;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Fix Admin Record</h1>
            <p>Fix the existing admin account in the LMS</p>
        </div>

        <div class="admin-details">
            <p><strong>User ID:</strong> 15c79e06-017f-48d5-acc0-a44f47d6d1d5</p>
            <p><strong>Email:</strong> admin@mathturo.com</p>
            <p><strong>Role:</strong> admin</p>
            <p><strong>Status:</strong> Account exists in auth.users but not in public.users</p>
        </div>

        <button type="button" class="btn-primary" id="fixBtn">
            <span id="btnText">Fix Admin Record</span>
            <span id="spinner" class="loading-spinner" style="display: none;"></span>
        </button>

        <div id="statusMessage" class="status-message"></div>

        <button type="button" class="btn-primary" style="margin-top: 12px; background: #48bb78;" id="checkBtn">
            Check Admin Accounts
        </button>
    </div>

    <!-- Supabase JavaScript CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config -->
    <script src="public/shared/js/config.js"></script>
    <script>
        // Initialize Supabase client
        const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        // Fix admin record button handler
        document.getElementById('fixBtn').addEventListener('click', async () => {
            setLoading(true);
            showStatus('Fixing admin record...', 'info');

            try {
                // Check if admin exists in public.users
                const { data: existingUser, error: checkError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', '15c79e06-017f-48d5-acc0-a44f47d6d1d5')
                    .single();

                if (checkError && checkError.code !== 'PGRST116') { // PGRST116 is "no rows returned"
                    throw checkError;
                }

                if (existingUser) {
                    showStatus('Admin record already exists in public.users table', 'success');
                    return;
                }

                // Try to create the admin record
                const { data: createdUser, error: createError } = await supabase
                    .from('users')
                    .insert({
                        id: '15c79e06-017f-48d5-acc0-a44f47d6d1d5',
                        email: 'admin@mathturo.com',
                        full_name: 'MathTuro Admin',
                        role: 'admin',
                        avatar_url: null,
                        is_active: true,
                        created_at: '2026-02-23 00:51:28.91259+00',
                        updated_at: '2026-02-23 00:51:29.055923+00'
                    })
                    .select()
                    .single();

                if (createError) {
                    throw createError;
                }

                showStatus(`Successfully fixed admin record! <br><br>
                    <strong>User ID:</strong> ${createdUser.id}<br>
                    <strong>Email:</strong> ${createdUser.email}<br>
                    <strong>Name:</strong> ${createdUser.full_name}<br>
                    <strong>Role:</strong> ${createdUser.role}`, 'success');

            } catch (error) {
                showStatus(`Error: ${error.message} <br><br>
                    This might be due to Row-Level Security (RLS) policies. <br>
                    Please try running the SQL script in create_admin_public_record.sql directly in the Supabase SQL Editor.`, 'error');
                console.error('Fix admin record error:', error);
            } finally {
                setLoading(false);
            }
        });

        // Check admin accounts button handler
        document.getElementById('checkBtn').addEventListener('click', async () => {
            try {
                const { data: admins, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('role', 'admin')
                    .order('created_at', { ascending: false });

                if (error) {
                    throw error;
                }

                if (admins.length === 0) {
                    showStatus('No admin accounts found in public.users table', 'info');
                } else {
                    let message = `<strong>Found ${admins.length} admin account${admins.length > 1 ? 's' : ''}:</strong><br><br>`;
                    admins.forEach(admin => {
                        message += `<strong>${admin.full_name}</strong><br>`;
                        message += `Email: ${admin.email}<br>`;
                        message += `Created: ${new Date(admin.created_at).toLocaleString()}<br>`;
                        message += `Active: ${admin.is_active ? 'Yes' : 'No'}<br><br>`;
                    });
                    showStatus(message, 'success');
                }
            } catch (error) {
                showStatus(`Error checking admin accounts: ${error.message}`, 'error');
                console.error('Check admins error:', error);
            }
        });

        // Show status message
        function showStatus(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.innerHTML = message;
            statusElement.className = `status-message ${type}`;
            statusElement.style.display = 'block';
        }

        // Set loading state
        function setLoading(isLoading) {
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const fixBtn = document.getElementById('fixBtn');
            const checkBtn = document.getElementById('checkBtn');

            fixBtn.disabled = isLoading;
            checkBtn.disabled = isLoading;
            
            if (isLoading) {
                btnText.textContent = 'Fixing...';
                spinner.style.display = 'inline-block';
            } else {
                btnText.textContent = 'Fix Admin Record';
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
