<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Logo/MATHURO-LOGO.png">
    <title>Learning Modules - MathTuro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared/js/supabase-lib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        brand: '#005801',
                        'brand-dark': '#004601',
                        'brand-light': '#006B01',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #005801 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #005801 0%, #16a34a 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(0, 88, 1, 0.3);
        }
        
        .module-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 250px;
            cursor: pointer;
            background: #ffffff;
            border: 1px solid #e5e7eb;
        }
        
        .module-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 40px -18px rgba(17, 24, 39, 0.18);
        }

        .module-preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .module-preview-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .module-preview-shell {
            width: 100%;
            height: 150px;
            background: linear-gradient(180deg, #f8fafc 0%, #e5e7eb 100%);
            overflow: hidden;
            border-radius: 1.4rem 1.4rem 0 0;
        }

        .module-description {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .module-chip {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            line-height: 1;
        }

        .module-chip-primary {
            background: #ecfdf3;
            color: #005801;
        }

        .module-chip-secondary {
            background: #f3f4f6;
            color: #6b7280;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #005801; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <main class="min-h-screen max-w-7xl mx-auto px-4 py-8">

        <div class="mb-8 relative">
            <button onclick="window.history.back()" aria-label="Back" style="background:none;border:none;position:absolute;left:-48px;top:0;cursor:pointer;padding:0;z-index:10;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color:#005801;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="text-3xl font-bold text-gray-800">Learning Modules</h1>
            <p class="text-gray-500">Browse modules by quarter</p>
        </div>

        <div class="mb-6 flex flex-wrap gap-2" id="quarterTabs">
            <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-brand text-white" data-quarter="all">All Modules</button>
            <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="1">Quarter 1</button>
            <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="2">Quarter 2</button>
            <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="3">Quarter 3</button>
            <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="4">Quarter 4</button>
        </div>

        <div id="modulesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-5 justify-items-start items-start">
            <div class="col-span-full py-12 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-brand border-t-transparent mb-4"></div>
                <p class="text-gray-500">Loading modules...</p>
            </div>
        </div>
    </main>

    <div id="signinModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-2">Sign in required</h2>
            <p class="text-gray-600 mb-6">You need to sign in before you can view module content.</p>
            <div class="flex gap-3 justify-end">
                <button type="button" onclick="closeSigninModal()" class="px-4 py-2 border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50">Cancel</button>
                <a href="login.html" class="px-4 py-2 bg-brand text-white rounded-xl hover:bg-brand-dark">Sign in</a>
            </div>
        </div>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script>
        let allModules = [];
        let activeQuarterFilter = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            setupQuarterTabs();
            await loadModules();
        });

        function normalizeQuarterValue(value) {
            if (value === null || value === undefined || value === '') return '';
            const quarter = String(value).trim().replace(/[^0-9]/g, '');
            return ['1', '2', '3', '4'].includes(quarter) ? quarter : '';
        }

        function setupQuarterTabs() {
            document.querySelectorAll('.quarter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    activeQuarterFilter = tab.dataset.quarter || 'all';
                    updateQuarterTabs();
                    renderModules();
                });
            });
            updateQuarterTabs();
        }

        function updateQuarterTabs() {
            document.querySelectorAll('.quarter-tab').forEach(tab => {
                const isActive = (tab.dataset.quarter || 'all') === activeQuarterFilter;
                tab.classList.toggle('bg-brand', isActive);
                tab.classList.toggle('text-white', isActive);
                tab.classList.toggle('bg-white', !isActive);
                tab.classList.toggle('text-gray-700', !isActive);
                tab.classList.toggle('border', !isActive);
                tab.classList.toggle('border-gray-200', !isActive);
            });
        }

        function resolveLearningMaterialUrl(rawPath) {
            if (!rawPath) return '';

            const value = String(rawPath).trim();
            if (!value) return '';

            if (/^https?:\/\//i.test(value)) {
                return value;
            }

            const normalizedPath = value
                .replace(/^\/+/, '')
                .replace(/^learning-materials\//i, '');

            if (!normalizedPath) return '';

            try {
                const { data } = getSupabase().storage.from('learning-materials').getPublicUrl(normalizedPath);
                return data?.publicUrl || value;
            } catch (error) {
                console.warn('Failed to resolve learning material URL:', error);
                return value;
            }
        }

        async function loadModules() {
            try {
                const { data, error } = await getSupabase()
                    .from('modules')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allModules = data || [];
                renderModules();
            } catch (error) {
                console.error('Error loading modules:', error);
                const container = document.getElementById('modulesGrid');
                container.innerHTML = '<div class="col-span-full py-12 text-center text-red-500">Failed to load modules.</div>';
            }
        }

        function renderModules() {
            const container = document.getElementById('modulesGrid');
            const filtered = activeQuarterFilter === 'all'
                ? allModules
                : allModules.filter(module => normalizeQuarterValue(module?.quarter ?? module?.module_quarter ?? module?.quarter_number) === activeQuarterFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full py-12 text-center text-gray-500">No modules found for this quarter.</div>';
                return;
            }

            container.innerHTML = filtered.map(module => {
                const quarter = normalizeQuarterValue(module?.quarter ?? module?.module_quarter ?? module?.quarter_number);
                const subtitle = module.topic || module.subject || module.grade_level_text || module.grade_level || 'Learning Module';
                const description = module.description || 'Open this module to start learning and explore the lesson activities.';
                const pdfSource = module.pdf_url || module.file_path || '';
                const pdfPreviewUrl = resolveLearningMaterialUrl(pdfSource);
                const lowerFilePath = String(pdfSource).toLowerCase();
                const isPdf = String(module.content_type || '').toLowerCase() === 'pdf' || lowerFilePath.includes('.pdf') || Boolean(module.pdf_url);
                const thumbnailSource = module.thumbnail_url || module.cover_image || module.image_url || '';
                const thumbnail = resolveLearningMaterialUrl(thumbnailSource) || pdfPreviewUrl || '../Logo/MATHURO-LOGO.png';

                const previewMedia = isPdf && pdfPreviewUrl
                    ? `<iframe src="${pdfPreviewUrl}#page=1&view=FitH&toolbar=0&navpanes=0&scrollbar=0" class="module-preview-frame" title="${escapeHtml(module.title || 'Module')}"></iframe>`
                    : `<img src="${thumbnail}" class="module-preview-image" alt="${escapeHtml(module.title || 'Module')}" onerror="this.onerror=null; this.src='../Logo/MATHURO-LOGO.png';">`;

                return `
                    <div class="module-card rounded-[1.6rem] shadow-lg overflow-hidden" onclick="openSigninModal()">
                        <div class="flex flex-col min-h-[320px]">
                            <div class="module-preview-shell">
                                ${previewMedia}
                            </div>
                            <div class="px-4 py-4 flex flex-col flex-1 min-w-0 bg-white">
                                <div class="flex flex-wrap gap-2 mb-3">
                                    <span class="module-chip module-chip-primary">${quarter ? `Quarter ${quarter}` : 'Module'}</span>
                                    <span class="module-chip module-chip-secondary">${escapeHtml(subtitle)}</span>
                                </div>
                                <h3 class="text-xl font-bold text-gray-900 mb-2 line-clamp-2">${escapeHtml(module.title || 'Untitled Module')}</h3>
                                <p class="module-description text-sm text-gray-600 leading-6 mb-4 flex-1">${escapeHtml(description)}</p>
                                <div class="w-full py-2.5 bg-brand text-white rounded-full text-center text-sm font-semibold hover:bg-brand-dark transition-colors">
                                    Open
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openSigninModal() {
            document.getElementById('signinModal').classList.remove('hidden');
        }

        function closeSigninModal() {
            document.getElementById('signinModal').classList.add('hidden');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('signinModal').addEventListener('click', (event) => {
            if (event.target.id === 'signinModal') {
                closeSigninModal();
            }
        });
    </script>
</body>
</html>
