<script>
// Highlight active link
const path = window.location.pathname;
document.querySelectorAll('.sidebar-link').forEach(link => {
  if (link.getAttribute('href') && path.endsWith(link.getAttribute('href').split('/').pop())) {
    link.classList.add('active');
  }
});
// Logout handler (replace with your actual logout logic)
document.getElementById('sidebar-logout').onclick = function() {
  // Example: clear session and redirect
  if (window.supabase) {
    window.supabase.auth.signOut().then(() => {
      window.location.href = '/login.html';
    });
  } else {
    window.location.href = '/login.html';
  }
};
</script>
