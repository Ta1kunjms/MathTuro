<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Grade Levels Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
    <script src="shared/js/supabase-lib.js"></script>
</head>
<body>
    <h1>Grade Levels and Sections Test</h1>
    
    <div id="loading" class="info">Loading...</div>
    <div id="results"></div>

    <script src="shared/js/config.js"></script>
    <script src="shared/js/supabase.js"></script>
    
    <script>
        async function testPage() {
            try {
                const resultsDiv = document.getElementById('results');
                const loadingDiv = document.getElementById('loading');
                
                loadingDiv.textContent = 'Checking authentication...';
                
                // Simulate login check (we don't need to actually log in for this test)
                const user = {
                    id: 'test-user-123',
                    email: 'admin@mathturo.com',
                    role: 'admin',
                    fullName: 'Admin User'
                };
                
                loadingDiv.textContent = 'Loading grade levels...';
                const gradeResponse = await getSupabase().from('grade_levels').select('*').order('name');
                if (gradeResponse.error) throw gradeResponse.error;
                
                const gradeLevels = gradeResponse.data || [];
                const gradeHtml = gradeLevels.map(grade => 
                    `<p>Grade: ${grade.name} (${grade.is_active ? 'Active' : 'Inactive'})</p>`
                ).join('');
                
                loadingDiv.textContent = 'Loading sections...';
                const sectionResponse = await getSupabase()
                    .from('sections')
                    .select(`
                        *,
                        grade_levels!sections_grade_level_id_fkey (
                            id,
                            name
                        )
                    `)
                    .order('name');
                
                if (sectionResponse.error) throw sectionResponse.error;
                
                const sections = sectionResponse.data || [];
                const sectionHtml = sections.map(section => 
                    `<p>Section: ${section.name} (Grade: ${section.grade_levels?.name || 'N/A'})</p>`
                ).join('');
                
                loadingDiv.style.display = 'none';
                
                resultsDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Test passed!</h3>
                        <div><strong>Grade Levels (${gradeLevels.length}):</strong><br>${gradeHtml}</div>
                        <div style="margin-top: 10px;"><strong>Sections (${sections.length}):</strong><br>${sectionHtml}</div>
                    </div>
                `;
                
            } catch (error) {
                const loadingDiv = document.getElementById('loading');
                loadingDiv.style.display = 'none';
                
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Error:</h3>
                        <p>${error.message}</p>
                        <p>Stack: ${error.stack}</p>
                    </div>
                `;
                
                console.error('Test failed:', error);
            }
        }
        
        // Run test when DOM is ready
        document.addEventListener('DOMContentLoaded', testPage);
    </script>
</body>
</html>
