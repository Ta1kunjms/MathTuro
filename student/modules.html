<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../Logo/MATHURO-LOGO-v2.png">
    <title>Browse Modules - MathTuro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared/js/supabase-lib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        brand: '#005801',
                        'brand-dark': '#004601',
                        'brand-light': '#006B01',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
                @media (max-width: 768px) {
                    .module-card,
                    .lesson-card,
                    .quiz-card {
                        max-width: 100% !important;
                        min-width: 0 !important;
                        width: 100% !important;
                        margin: 0 0 1.5rem 0 !important;
                        padding: 1.25rem !important;
                        box-sizing: border-box;
                    }
                    .modules-grid,
                    .cards-row {
                        display: flex !important;
                        flex-direction: column !important;
                        gap: 1.5rem !important;
                    }
                }
        
        .gradient-text {
            background: linear-gradient(135deg, #005801 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #005801 0%, #16a34a 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(0, 88, 1, 0.3);
        }
        
        .module-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 380px;
            width: 100%;
        }
        
        .module-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -14px rgba(0, 88, 1, 0.25);
        }
        
        .module-card a {
            text-decoration: none;
            color: inherit;
        }
        
        .module-card iframe {
            border: none;
            background: white;
        }

        .module-preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .module-preview-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .module-description {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #005801; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #004601; }
    </style>
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="assets/css/student.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 glass-sidebar border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"></aside>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <!-- Top Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-4 lg:px-8 py-4">
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="lg:hidden p-2 text-gray-600 hover:text-brand rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                
                <!-- Page Title -->
                <div class="flex-1 lg:flex-none">
                     <h1 class="text-xl lg:text-2xl font-bold text-gray-800">Browse Modules</h1>
                    <p class="text-sm text-gray-500 hidden sm:block">Explore available learning modules</p>
                </div>
                
                <!-- Module Count -->
                <div class="flex items-center space-x-4">
                    <span class="px-4 py-2 bg-brand/10 text-brand rounded-xl text-sm font-medium">
                        <span id="moduleCount">0</span> modules
                    </span>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-4 lg:p-8">
            <!-- Search Bar -->
            <div class="mb-8">
                <div class="relative max-w-xl">
                    <input type="text" id="searchInput" placeholder="Search modules by title or description..." 
                        class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-brand focus:border-transparent bg-white shadow-sm">
                    <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 mb-8" id="quarterTabs">
                <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-brand text-white" data-quarter="all">All Modules</button>
                <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="1">Quarter 1</button>
                <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="2">Quarter 2</button>
                <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="3">Quarter 3</button>
                <button type="button" class="quarter-tab px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:border-brand/40" data-quarter="4">Quarter 4</button>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-brand border-t-transparent"></div>
                <p class="mt-4 text-gray-600">Loading modules...</p>
            </div>

            <!-- Modules Grid -->
            <div id="modulesGrid" class="hidden grid grid-cols-5 gap-6 justify-start items-stretch overflow-x-auto" style="grid-auto-flow: column;">
                <!-- Modules will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-16">
                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">No Modules Available</h3>
                <p class="text-gray-600 mb-6">Check back later for new learning materials.</p>
                <a href="dashboard.html" class="inline-flex items-center space-x-2 px-6 py-3 bg-brand text-white rounded-xl hover:bg-brand-dark transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/>
                    </svg>
                    <span>Back to Dashboard</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="assets/js/sidebar.js"></script>
    
    <script>
        let currentUser = null;
        let modules = [];
        let studentAssignment = null;
        let activeQuarterFilter = 'all';

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                currentUser = await checkAuthSession();
                if (!currentUser || currentUser.role !== 'student') {
                    redirectToLogin();
                    return;
                }
                
                updateUserDisplay(currentUser);
                setupEventListeners();
                await loadModules();
            } catch (error) {
                console.error('Init error:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        });

        function updateUserDisplay(user) {
            const displayName = user.fullName || user.email || 'Student';
            const initials = displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            const userNameEl = document.getElementById('sidebarUserName');
            const userInitialsEl = document.getElementById('userInitials');
            if (userNameEl) userNameEl.textContent = displayName;
            if (userInitialsEl) userInitialsEl.textContent = initials;
        }

        function normalizeGradeValue(value) {
            if (value === null || value === undefined || value === '') return null;
            const str = String(value).trim().toLowerCase();
            return str.startsWith('grade') ? str.replace(/^grade\s*/, '') : str;
        }

        function normalizeQuarterValue(value) {
            if (value === null || value === undefined || value === '') return '';
            const quarter = String(value).trim().replace(/[^0-9]/g, '');
            return ['1', '2', '3', '4'].includes(quarter) ? quarter : '';
        }

        function getModuleQuarter(module) {
            return normalizeQuarterValue(module?.quarter ?? module?.module_quarter ?? module?.quarter_number);
        }

        function getQuarterLabel(module) {
            const quarter = getModuleQuarter(module);
            return quarter ? `Quarter ${quarter}` : '';
        }

        function resolveLearningMaterialUrl(rawPath) {
            if (!rawPath) return '';

            const value = String(rawPath).trim();
            if (!value) return '';

            if (/^https?:\/\//i.test(value)) {
                return value;
            }

            const normalizedPath = value
                .replace(/^\/+/, '')
                .replace(/^learning-materials\//i, '');

            if (!normalizedPath) return '';

            try {
                const { data } = getSupabase().storage.from('learning-materials').getPublicUrl(normalizedPath);
                return data?.publicUrl || value;
            } catch (error) {
                console.warn('Failed to resolve learning material URL:', error);
                return value;
            }
        }

        function getModuleProgress(module) {
            const value = Number(module.progress_percentage ?? module.progress ?? 0);
            if (Number.isNaN(value)) return 0;
            return Math.max(0, Math.min(100, Math.round(value)));
        }

        function getProgressStatus(progress) {
            if (progress >= 100) {
                return { label: 'Completed', className: 'bg-green-100 text-green-700' };
            }
            if (progress > 0) {
                return { label: 'In Progress', className: 'bg-yellow-100 text-yellow-700' };
            }
            return { label: 'Not Started', className: 'bg-gray-100 text-gray-600' };
        }

        function getEstimatedTime(module) {
            const minutes = Number(module.estimated_minutes ?? module.duration_minutes ?? module.reading_time_minutes);
            if (Number.isFinite(minutes) && minutes > 0) return `${Math.round(minutes)} min`;
            return module.content_type === 'pdf' ? '15 min' : '10 min';
        }

        function getDifficulty(module) {
            const difficulty = String(module.difficulty ?? module.level ?? 'Beginner').trim();
            if (!difficulty) return 'Beginner';
            return difficulty.charAt(0).toUpperCase() + difficulty.slice(1).toLowerCase();
        }

        function setupEventListeners() {
            // Logout
            document.getElementById('logoutButton').addEventListener('click', async () => {
                await logout();
                redirectToLogin();
            });

            // Mobile menu
            document.getElementById('mobileMenuBtn').addEventListener('click', toggleMobileMenu);
            document.getElementById('mobileOverlay').addEventListener('click', toggleMobileMenu);

            // Search
            document.getElementById('searchInput').addEventListener('input', handleSearch);

            document.querySelectorAll('.quarter-tab').forEach(tab => {
                tab.addEventListener('click', () => setQuarterFilter(tab.dataset.quarter || 'all'));
            });
            updateQuarterTabs();
        }

        function setQuarterFilter(quarter) {
            activeQuarterFilter = quarter || 'all';
            updateQuarterTabs();
            renderModules(modules);
        }

        function updateQuarterTabs() {
            document.querySelectorAll('.quarter-tab').forEach(tab => {
                const isActive = (tab.dataset.quarter || 'all') === activeQuarterFilter;
                tab.classList.toggle('bg-brand', isActive);
                tab.classList.toggle('text-white', isActive);
                tab.classList.toggle('bg-white', !isActive);
                tab.classList.toggle('text-gray-700', !isActive);
                tab.classList.toggle('border', !isActive);
                tab.classList.toggle('border-gray-200', !isActive);
            });
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function handleSearch() {
            renderModules(modules);
        }

        async function loadModules() {
            try {
                studentAssignment = await getStudentGradeSection(currentUser.id);

                const { data, error } = await getSupabase()
                    .from('modules')
                    .select('*')
                    .eq('status', 'published')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const gradeId = studentAssignment?.gradeLevel?.id;
                const sectionId = studentAssignment?.section?.id;
                const gradeName = normalizeGradeValue(studentAssignment?.gradeLevel?.name);

                modules = (data || []).filter(module => {
                    const moduleGradeId = module.grade_level_id ?? null;
                    const moduleSectionId = module.section_id ?? null;
                    const moduleGrade = normalizeGradeValue(module.grade_level ?? module.grade_level_name ?? null);

                    const gradeMatch =
                        !gradeId && !gradeName
                            ? true
                            : moduleGradeId
                                ? String(moduleGradeId) === String(gradeId)
                                : moduleGrade
                                    ? moduleGrade === gradeName
                                    : true;

                    const sectionMatch =
                        !sectionId
                            ? true
                            : moduleSectionId
                                ? String(moduleSectionId) === String(sectionId)
                                : true;

                    return gradeMatch && sectionMatch;
                });
                
                // Hide loading state
                document.getElementById('loadingState').classList.add('hidden');
                
                if (modules.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                } else {
                    document.getElementById('modulesGrid').classList.remove('hidden');
                    renderModules(modules);
                }
            } catch (error) {
                console.error('Error loading modules:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function renderModules(data) {
            const grid = document.getElementById('modulesGrid');
            const empty = document.getElementById('emptyState');
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const quarterFiltered = activeQuarterFilter === 'all'
                ? data
                : data.filter(module => getModuleQuarter(module) === activeQuarterFilter);
            const filtered = query
                ? quarterFiltered.filter(m =>
                    (m.title || '').toLowerCase().includes(query) ||
                    ((m.description || '').toLowerCase().includes(query))
                )
                : quarterFiltered;

            document.getElementById('moduleCount').textContent = filtered.length;

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            
            grid.innerHTML = filtered.map(module => {
                const subtitle = module.topic || module.subject || module.grade_level_text || module.grade_level || 'Learning Module';
                const description = module.description || 'Open this module to start learning and explore the lesson activities.';
                const pdfSource = module.pdf_url || module.file_path || '';
                const pdfPreviewUrl = resolveLearningMaterialUrl(pdfSource);
                const lowerFilePath = String(pdfSource).toLowerCase();
                const isPdf = String(module.content_type || '').toLowerCase() === 'pdf' || lowerFilePath.includes('.pdf') || Boolean(module.pdf_url);
                const quarterLabel = getQuarterLabel(module);
                // Use first page of PDF as thumbnail if possible, else fallback to image or logo
                let previewMedia = '';
                if (isPdf && pdfPreviewUrl) {
                    previewMedia = `<iframe src="${pdfPreviewUrl}#page=1&view=FitH&toolbar=0&navpanes=0&scrollbar=0" class="module-preview-frame" title="${module.title}" style="width:100%;height:100%;min-height:120px;"></iframe>`;
                } else {
                    const thumbnailSource = module.thumbnail_url || module.cover_image || module.image_url || '';
                    const thumbnail = resolveLearningMaterialUrl(thumbnailSource) || '../Logo/MATHURO-LOGO-v2.png';
                    previewMedia = `<img src="${thumbnail}" class="module-preview-image" alt="${module.title}" onerror="this.onerror=null; this.src='../Logo/MATHURO-LOGO-v2.png';">`;
                }
                return `
                <div class="module-card bg-primary-100 rounded-[2rem] shadow-xl overflow-hidden mx-auto min-w-[260px] max-w-[300px] flex flex-col">
                    <a href="module-view.html?id=${module.id}" class="flex flex-col h-[360px]">
                        <div class="h-[46%] bg-gray-200 overflow-hidden flex items-center justify-center">
                            ${previewMedia}
                        </div>
                        <div class="px-5 py-4 flex flex-col flex-1">
                            <h3 class="text-2xl font-extrabold text-gray-900 mb-1 line-clamp-1">${module.title}</h3>
                            <p class="text-xl font-semibold text-gray-900 mb-1 line-clamp-1">${subtitle}</p>
                            ${quarterLabel ? `<p class="text-sm font-medium text-brand mb-2">${quarterLabel}</p>` : ''}
                            <p class="module-description text-[12px] text-gray-700 italic leading-snug mb-4 flex-1">${description}</p>
                            <div class="w-full py-2.5 bg-brand text-white rounded-full text-center text-2xl font-bold hover:bg-brand-dark transition-colors">
                                Open
                            </div>
                        </div>
                    </a>
                </div>
            `;
            }).join('');
        }
    </script>
</body>
</html>
