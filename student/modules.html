<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../Logo/MATHURO-LOGO.png">
    <title>Browse Modules - MathTuro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        brand: '#005801',
                        'brand-dark': '#004601',
                        'brand-light': '#006B01',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #005801 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #005801 0%, #16a34a 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(0, 88, 1, 0.3);
        }
        
        .module-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 320px;
            width: 100%;
        }
        
        .module-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 88, 1, 0.2);
            border-color: #005801;
        }
        
        .module-card a {
            text-decoration: none;
            color: inherit;
        }
        
        .module-card iframe {
            border: none;
            background: white;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #005801; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #004601; }
    </style>
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="assets/css/student.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 glass-sidebar border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"></aside>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <!-- Top Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-4 lg:px-8 py-4">
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="lg:hidden p-2 text-gray-600 hover:text-brand rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                
                <!-- Page Title -->
                <div class="flex-1 lg:flex-none">
                     <h1 class="text-xl lg:text-2xl font-bold text-gray-800">Browse Modules</h1>
                    <p class="text-sm text-gray-500 hidden sm:block">Explore available learning modules</p>
                </div>
                
                <!-- Module Count -->
                <div class="flex items-center space-x-4">
                    <span class="px-4 py-2 bg-brand/10 text-brand rounded-xl text-sm font-medium">
                        <span id="moduleCount">0</span> modules
                    </span>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-4 lg:p-8">
            <!-- Search Bar -->
            <div class="mb-8">
                <div class="relative max-w-xl">
                    <input type="text" id="searchInput" placeholder="Search modules by title or description..." 
                        class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-brand focus:border-transparent bg-white shadow-sm">
                    <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-brand border-t-transparent"></div>
                <p class="mt-4 text-gray-600">Loading modules...</p>
            </div>

            <!-- Modules Grid -->
            <div id="modulesGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 justify-items-center">
                <!-- Modules will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-16">
                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">No Modules Available</h3>
                <p class="text-gray-600 mb-6">Check back later for new learning materials.</p>
                <a href="dashboard.html" class="inline-flex items-center space-x-2 px-6 py-3 bg-brand text-white rounded-xl hover:bg-brand-dark transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/>
                    </svg>
                    <span>Back to Dashboard</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/utils.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script src="../shared/js/auth.js"></script>
    <script src="assets/js/sidebar.js"></script>
    
    <script>
        let currentUser = null;
        let modules = [];
        let studentAssignment = null;

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                currentUser = await checkAuthSession();
                if (!currentUser || currentUser.role !== 'student') {
                    redirectToLogin();
                    return;
                }
                
                updateUserDisplay(currentUser);
                setupEventListeners();
                await loadModules();
            } catch (error) {
                console.error('Init error:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        });

        function updateUserDisplay(user) {
            const displayName = user.fullName || user.email || 'Student';
            const initials = displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            const userNameEl = document.getElementById('sidebarUserName');
            const userInitialsEl = document.getElementById('userInitials');
            if (userNameEl) userNameEl.textContent = displayName;
            if (userInitialsEl) userInitialsEl.textContent = initials;
        }

        function normalizeGradeValue(value) {
            if (value === null || value === undefined || value === '') return null;
            const str = String(value).trim().toLowerCase();
            return str.startsWith('grade') ? str.replace(/^grade\s*/, '') : str;
        }

        function setupEventListeners() {
            // Logout
            document.getElementById('logoutButton').addEventListener('click', async () => {
                await logout();
                redirectToLogin();
            });

            // Mobile menu
            document.getElementById('mobileMenuBtn').addEventListener('click', toggleMobileMenu);
            document.getElementById('mobileOverlay').addEventListener('click', toggleMobileMenu);

            // Search
            document.getElementById('searchInput').addEventListener('input', handleSearch);
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (query === '') {
                renderModules(modules);
            } else {
                const filtered = modules.filter(m => 
                    m.title.toLowerCase().includes(query) || 
                    (m.description && m.description.toLowerCase().includes(query))
                );
                renderModules(filtered);
            }
        }

        async function loadModules() {
            try {
                studentAssignment = await getStudentGradeSection(currentUser.id);

                const { data, error } = await getSupabase()
                    .from('modules')
                    .select('*')
                    .eq('status', 'published')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const gradeId = studentAssignment?.gradeLevel?.id;
                const sectionId = studentAssignment?.section?.id;
                const gradeName = normalizeGradeValue(studentAssignment?.gradeLevel?.name);

                modules = (data || []).filter(module => {
                    const moduleGradeId = module.grade_level_id ?? null;
                    const moduleSectionId = module.section_id ?? null;
                    const moduleGrade = normalizeGradeValue(module.grade_level ?? module.grade_level_name ?? null);

                    const gradeMatch =
                        !gradeId && !gradeName
                            ? true
                            : moduleGradeId
                                ? String(moduleGradeId) === String(gradeId)
                                : moduleGrade
                                    ? moduleGrade === gradeName
                                    : true;

                    const sectionMatch =
                        !sectionId
                            ? true
                            : moduleSectionId
                                ? String(moduleSectionId) === String(sectionId)
                                : true;

                    return gradeMatch && sectionMatch;
                });
                
                // Hide loading state
                document.getElementById('loadingState').classList.add('hidden');
                
                if (modules.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                } else {
                    document.getElementById('modulesGrid').classList.remove('hidden');
                    renderModules(modules);
                }
            } catch (error) {
                console.error('Error loading modules:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function renderModules(data) {
            const grid = document.getElementById('modulesGrid');
            const empty = document.getElementById('emptyState');
            document.getElementById('moduleCount').textContent = data.length;

            if (data.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            
            grid.innerHTML = data.map(module => `
                <div class="module-card bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden flex flex-col max-w-sm mx-auto">
                    <a href="module-view.html?id=${module.id}" class="flex flex-col h-full">
                        <div class="h-48 bg-gradient-to-br from-brand to-brand-light relative overflow-hidden">
                            ${module.content_type === 'pdf' ? `
                                <div class="absolute inset-0 flex items-center justify-center">
                                    ${module.file_path ? `
                                        <iframe src="${module.file_path}#view=FitH&toolbar=0&navpanes=0" 
                                                class="w-full h-full" 
                                                style="min-height: 200px;"
                                                title="${module.title}">
                                        </iframe>
                                    ` : `
                                        <svg class="w-16 h-16 text-white/80" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4z"/>
                                        </svg>
                                    `}
                                </div>
                            ` : `
                                <div class="absolute inset-0 flex items-center justify-center">
                                    ${module.file_path ? `
                                        <img src="${module.file_path}" 
                                             class="w-full h-full object-cover" 
                                             alt="${module.title}">
                                    ` : `
                                        <svg class="w-16 h-16 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                        </svg>
                                    `}
                                </div>
                            `}
                            <span class="absolute top-3 right-3 px-3 py-1 bg-white/20 backdrop-blur-sm rounded-full text-xs text-white font-medium">
                                ${module.content_type === 'pdf' ? 'PDF Module' : 'Image Module'}
                            </span>
                        </div>
                        <div class="p-5 flex flex-col flex-1">
                            <h3 class="font-bold text-gray-800 mb-2 line-clamp-2 text-lg">${module.title}</h3>
                            <p class="text-sm text-gray-600 line-clamp-2 mb-4 flex-1">${module.description || 'No description available'}</p>
                            <div class="flex items-center text-xs text-gray-500 mb-4">
                                <span class="flex items-center space-x-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    <span>${new Date(module.created_at).toLocaleDateString()}</span>
                                </span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="py-3 bg-brand text-white rounded-xl text-center text-sm font-semibold hover:bg-brand-dark transition-colors">
                                    Start Learning →
                                </div>
                                <a href="lesson-view.html?moduleId=${module.id}" class="py-3 bg-brand/10 text-brand rounded-xl text-center text-sm font-semibold hover:bg-brand/20 transition-colors">
                                    Quick Lesson
                                </a>
                            </div>
                        </div>
                    </a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
