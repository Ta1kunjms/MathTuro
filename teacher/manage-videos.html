    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-lg z-50 flex items-center space-x-2"></div>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script>
        let currentUser = null;
        let videos = [];
        let editingVideoId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadVideos();
            setupEventListeners();
            setupMobileMenu();
        });

        // Setup mobile menu
        function setupMobileMenu() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.getElementById('sidebar');
            const mobileOverlay = document.getElementById('mobileOverlay');

            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('-translate-x-full');
                mobileOverlay.classList.toggle('hidden');
            });

            mobileOverlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                mobileOverlay.classList.add('hidden');
            });
        }

        async function checkAuth() {
            const { data: { session } } = await getSupabase().auth.getSession();
            if (!session) {
                window.location.href = '../login.html';
                return;
            }
            
            const { data: user } = await getSupabase()
                .from('users')
                .select('*')
                .eq('id', session.user.id)
                .single();
            
            if (!user || user.role !== 'teacher') {
                window.location.href = '../login.html';
                return;
            }
            
            currentUser = user;
            
            // Update sidebar user info
            const initials = user.full_name ? user.full_name.split(' ').map(n => n[0]).join('').toUpperCase() : '--';
            document.getElementById('userInitials').textContent = initials;
            document.getElementById('sidebarUserName').textContent = user.full_name || 'Teacher';
        }

        async function logout() {
            await getSupabase().auth.signOut();
            window.location.href = '../login.html';
        }

        function showStudentsPage() {
            window.location.href = 'student-progress.html';
        }

        function showReportsPage() {
            window.location.href = 'reports.html';
        }

        async function loadVideos() {
            try {
                const { data, error } = await getSupabase()
                    .from('videos')
                    .select('*')
                    .eq('teacher_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                videos = data || [];
                updateStats();
                renderVideos();
            } catch (error) {
                console.error('Error loading videos:', error);
                showToast('Failed to load videos', 'error');
            }
        }

        function updateStats() {
            document.getElementById('totalVideos').textContent = videos.length;
            document.getElementById('publishedVideos').textContent = videos.filter(v => v.is_published).length;
            document.getElementById('draftVideos').textContent = videos.filter(v => !v.is_published).length;
            document.getElementById('totalViews').textContent = videos.reduce((sum, v) => sum + (v.view_count || 0), 0);
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            const emptyState = document.getElementById('emptyState');
            
            // Apply filters
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            let filtered = videos.filter(v => {
                if (search && !v.title.toLowerCase().includes(search) && !v.description?.toLowerCase().includes(search)) return false;
                if (category && v.category !== category) return false;
                if (status === 'published' && !v.is_published) return false;
                if (status === 'draft' && v.is_published) return false;
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = filtered.map(video => `
                <div class="video-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden transition-all duration-200">
                    <div class="relative">
                        <img src="${getYouTubeThumbnail(video.video_url)}" alt="${video.title}" 
                            class="w-full h-40 object-cover bg-gray-100">
                        <div class="absolute top-2 right-2">
                            <span class="status-badge ${video.is_published ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                ${video.is_published ? 'Published' : 'Draft'}
                            </span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-gray-900 mb-1 line-clamp-2">${video.title}</h3>
                        <p class="text-sm text-gray-500 mb-3 line-clamp-2">${video.description || 'No description'}</p>
                        <div class="flex items-center justify-between text-xs text-gray-400 mb-3">
                            <span><i class="fas fa-folder mr-1"></i>${video.category || 'Uncategorized'}</span>
                            <span><i class="fas fa-eye mr-1"></i>${video.view_count || 0} views</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editVideo('${video.id}')" 
                                class="flex-1 px-3 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                            <button onclick="togglePublish('${video.id}', ${video.is_published})" 
                                class="flex-1 px-3 py-2 text-sm ${video.is_published ? 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200' : 'bg-green-100 text-green-700 hover:bg-green-200'} rounded-lg transition-colors">
                                <i class="fas fa-${video.is_published ? 'eye-slash' : 'check'} mr-1"></i>
                                ${video.is_published ? 'Unpublish' : 'Publish'}
                            </button>
                            <button onclick="deleteVideo('${video.id}')" 
                                class="px-3 py-2 text-sm bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition-colors">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getYouTubeThumbnail(url) {
            if (!url) return 'https://via.placeholder.com/320x180?text=No+Thumbnail';
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            if (match) return `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg`;
            return 'https://via.placeholder.com/320x180?text=Video';
        }

        function setupEventListeners() {
            // Logout button
            document.getElementById('logoutButton').addEventListener('click', logout);
            
            document.getElementById('videoForm').addEventListener('submit', handleSubmit);
            document.getElementById('searchInput').addEventListener('input', renderVideos);
            document.getElementById('categoryFilter').addEventListener('change', renderVideos);
            document.getElementById('statusFilter').addEventListener('change', renderVideos);
            
            // Thumbnail preview
            document.getElementById('videoUrl').addEventListener('input', function() {
                const thumbnail = getYouTubeThumbnail(this.value);
                if (thumbnail && !thumbnail.includes('placeholder')) {
                    document.getElementById('thumbnailImg').src = thumbnail;
                    document.getElementById('thumbnailPreview').classList.remove('hidden');
                } else {
                    document.getElementById('thumbnailPreview').classList.add('hidden');
                }
            });
        }

        function openAddVideoModal() {
            editingVideoId = null;
            document.getElementById('modalTitle').textContent = 'Add Video';
            document.getElementById('videoForm').reset();
            document.getElementById('thumbnailPreview').classList.add('hidden');
            document.getElementById('videoModal').classList.remove('hidden');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.add('hidden');
            editingVideoId = null;
        }

        function editVideo(id) {
            const video = videos.find(v => v.id === id);
            if (!video) return;
            
            editingVideoId = id;
            document.getElementById('modalTitle').textContent = 'Edit Video';
            document.getElementById('videoId').value = id;
            document.getElementById('videoTitle').value = video.title;
            document.getElementById('videoDescription').value = video.description || '';
            document.getElementById('videoUrl').value = video.video_url;
            document.getElementById('videoCategory').value = video.category || '';
            document.getElementById('videoGradeLevel').value = video.grade_level || '';
            document.getElementById('videoSubject').value = video.subject || '';
            document.getElementById('videoPublished').checked = video.is_published;
            
            // Show thumbnail
            const thumbnail = getYouTubeThumbnail(video.video_url);
            if (thumbnail && !thumbnail.includes('placeholder')) {
                document.getElementById('thumbnailImg').src = thumbnail;
                document.getElementById('thumbnailPreview').classList.remove('hidden');
            }
            
            document.getElementById('videoModal').classList.remove('hidden');
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';

            try {
                const videoData = {
                    title: document.getElementById('videoTitle').value,
                    description: document.getElementById('videoDescription').value,
                    video_url: document.getElementById('videoUrl').value,
                    thumbnail_url: getYouTubeThumbnail(document.getElementById('videoUrl').value),
                    category: document.getElementById('videoCategory').value,
                    grade_level: document.getElementById('videoGradeLevel').value || null,
                    subject: document.getElementById('videoSubject').value || null,
                    is_published: document.getElementById('videoPublished').checked
                };

                let result;
                if (editingVideoId) {
                    result = await getSupabase()
                        .from('videos')
                        .update(videoData)
                        .eq('id', editingVideoId);
                } else {
                    // Only add teacher_id for new videos
                    videoData.teacher_id = currentUser.id;
                    result = await getSupabase()
                        .from('videos')
                        .insert(videoData);
                }

                if (result.error) throw result.error;

                showToast(editingVideoId ? 'Video updated!' : 'Video added!', 'success');
                closeVideoModal();
                await loadVideos();
            } catch (error) {
                console.error('Error saving video:', error);
                showToast('Failed to save video: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Video';
            }
        }

        async function togglePublish(id, currentStatus) {
            try {
                const { error } = await getSupabase()
                    .from('videos')
                    .update({ is_published: !currentStatus })
                    .eq('id', id);

                if (error) throw error;
                showToast(currentStatus ? 'Video unpublished' : 'Video published!', 'success');
                await loadVideos();
            } catch (error) {
                showToast('Failed to update video', 'error');
            }
        }

        async function deleteVideo(id) {
            if (!confirm('Are you sure you want to delete this video?')) return;
            
            try {
                const { error } = await getSupabase()
                    .from('videos')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                showToast('Video deleted', 'success');
                await loadVideos();
            } catch (error) {
                showToast('Failed to delete video', 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-lg z-50 flex items-center space-x-2 ${
                type === 'success' ? 'bg-green-500 text-white' :
                type === 'error' ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'
            }`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i><span>${message}</span>`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
