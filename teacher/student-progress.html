<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Progress - MathTuro LMS</title>
    <link rel="icon" type="image/png" href="../Logo/MATHURO-LOGO.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        brand: '#005801',
                        'brand-dark': '#004601',
                        'brand-light': '#006B01',
                        teacher: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            500: '#910568',
                            600: '#720455',
                            700: '#5a0344',
                            800: '#4a0338',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #005801 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #005801 0%, #006B01 100%);
            color: white;
        }
        
        .sidebar-link.active {
            box-shadow: 0 4px 15px rgba(0, 88, 1, 0.3);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #005801; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #004601; }
    </style>
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="assets/css/teacher.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <!-- Sidebar (injected by JS) -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <!-- Top Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-4 lg:px-8 py-4">
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="lg:hidden p-2 text-gray-600 hover:text-brand rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                
                <!-- Page Title -->
                <div class="flex-1 lg:flex-none">
                    <h1 class="text-xl lg:text-2xl font-bold text-gray-800">Student Progress</h1>
                    <p class="text-sm text-gray-500 hidden sm:block">Track student submissions and performance</p>
                </div>
                
                <!-- Right Actions -->
                <div class="flex items-center space-x-4">
                    <!-- User Menu -->
                    <div class="relative">
                        <button id="userMenuBtn" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100">
                            <div class="w-8 h-8 bg-teacher-100 rounded-full flex items-center justify-center">
                                <span id="headerUserInitials" class="text-teacher-600 font-semibold text-sm">--</span>
                            </div>
                        </button>
                        
                        <!-- Dropdown -->
                        <div id="userDropdown" class="hidden absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-lg border border-gray-100 py-2">
                            <div class="px-4 py-2 border-b border-gray-100">
                                <p id="dropdownUserName" class="font-semibold text-gray-800 truncate">User</p>
                                <p id="dropdownUserEmail" class="text-sm text-gray-500 truncate">email@example.com</p>
                            </div>
                            <button onclick="handleLogout()" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-4 lg:p-8">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm">
                <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-800">Student Progress</h2>
                        <p class="text-sm text-gray-500">Track student submissions and performance</p>
                    </div>
                    <span id="submissionCount" class="text-sm text-gray-500">0 submissions</span>
                </div>
                <div id="progressTableContainer" class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Student</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Module</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Quiz</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Score</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Submitted</th>
                            </tr>
                        </thead>
                        <tbody id="progressTableBody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="6" class="text-center py-8 text-gray-400">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../shared/js/config.js"></script>
    <script src="../shared/js/supabase.js"></script>
    <script src="../shared/js/auth.js"></script>
        <script src="assets/js/sidebar.js"></script>
    <script>
        // Mobile menu setup
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.getElementById('sidebar');
            const mobileOverlay = document.getElementById('mobileOverlay');

            if (mobileMenuBtn && sidebar && mobileOverlay) {
                mobileMenuBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('-translate-x-full');
                    mobileOverlay.classList.toggle('hidden');
                });

                mobileOverlay.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                    mobileOverlay.classList.add('hidden');
                });
            }

            // User dropdown
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            
            if (userMenuBtn && userDropdown) {
                userMenuBtn.addEventListener('click', () => {
                    userDropdown.classList.toggle('hidden');
                });

                document.addEventListener('click', (e) => {
                    if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
                        userDropdown.classList.add('hidden');
                    }
                });
            }

            // Load user info and data
            loadUserInfo();
            loadProgressData();
        });

        async function loadUserInfo() {
            try {
                const supabase = getSupabase();
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    window.location.href = '../login.html';
                    return;
                }

                const { data: user } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();

                if (user) {
                    const initials = user.full_name ? user.full_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) : '--';
                    const headerEl = document.getElementById('headerUserInitials');
                    const nameEl = document.getElementById('dropdownUserName');
                    const emailEl = document.getElementById('dropdownUserEmail');
                    if (headerEl) headerEl.textContent = initials;
                    if (nameEl) nameEl.textContent = user.full_name || 'User';
                    if (emailEl) emailEl.textContent = user.email || '';
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }

        async function loadProgressData() {
            const tableBody = document.getElementById('progressTableBody');
            const countSpan = document.getElementById('submissionCount');
            
            try {
                const supabase = getSupabase();
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }
                const { data, error } = await supabase
                    .from('quiz_submissions')
                    .select('*, user:users!quiz_submissions_user_id_fkey(full_name), modules(title), quizzes(title)')
                    .order('submitted_at', { ascending: false });
                
                if (error) {
                    console.error('Error loading submissions:', error);
                    throw error;
                }
                
                if (countSpan) {
                    countSpan.textContent = `${data.length} submissions`;
                }
                
                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400">No submissions found.</td></tr>';
                    return;
                }
                
                tableBody.innerHTML = data.map(sub => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${sub.user?.full_name || 'Student'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${sub.modules?.title || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${sub.quizzes?.title || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${sub.student_score ?? '-'} / ${sub.total_items ?? '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${sub.status === 'approved' ? 'bg-green-100 text-green-700' : sub.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}">
                                ${sub.status ? sub.status.charAt(0).toUpperCase() + sub.status.slice(1) : 'Pending'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-gray-500">${sub.submitted_at ? new Date(sub.submitted_at).toLocaleString() : '-'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Error loading progress data:', err);
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-400">Failed to load data: ${err.message}</td></tr>`;
            }
        }

        async function handleLogout() {
            try {
                const supabase = getSupabase();
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }
                await supabase.auth.signOut();
                window.location.href = '../login.html';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '../login.html';
            }
        }
    </script>
</body>
</html>
