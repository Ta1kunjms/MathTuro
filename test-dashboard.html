<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dashboard - MathTuro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #005801 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        .sidebar-link {
            transition: all 0.2s ease;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(135deg, #005801 0%, #006B01 100%);
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 glass-sidebar border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col relative"></aside>

    <!-- Main Content -->
    <main class="lg:ml-72 min-h-screen">
        <div class="p-8">
            <h1 class="text-2xl font-bold text-gray-800">Test Dashboard</h1>
            <p class="text-gray-600">Checking if sidebar loads correctly...</p>
        </div>
    </main>

    <script src="student/assets/js/sidebar.js"></script>
    <script>
        console.log('Test dashboard loaded');
        console.log('Sidebar element:', document.getElementById('sidebar'));
        console.log('Sidebar content:', document.getElementById('sidebar').innerHTML);
    </script>
</body>
</html>
